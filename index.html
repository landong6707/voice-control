<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音控制音视频</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #f8fafc;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { margin-bottom: 10px; }
        .media-box {
            margin: 20px 0;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 12px;
            background: #fff;
        }
        video, audio { width: 100%; margin: 10px 0; display: block; }
        .voice-btn {
            padding: 14px 28px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 0;
        }
        .voice-btn.active { background: #dc2626; }
        .voice-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .tips { color: #666; margin: 10px 0; line-height: 1.6; }
        .result { color: #2563eb; font-weight: bold; font-size: 16px; margin: 10px 0; min-height: 24px; }
        .warn { color: #dc2626; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 语音控制音视频</h1>
    <p class="tips">
        支持命令：播放视频、暂停视频、播放音乐、暂停音乐<br>
        请先点击「开启语音监听」，并允许麦克风权限
    </p>

    <button class="voice-btn" id="voiceBtn">开启语音监听</button>
    <p class="result" id="result">等待开启...</p>
    <p class="warn" id="warn"></p>

    <div class="media-box">
        <h3>📽️ 视频</h3>
        <video id="video" controls playsinline webkit-playsinline>
            <source src="https://www.w3school.com.cn/i/movie.mp4" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
    </div>

    <div class="media-box">
        <h3>🎵 音乐</h3>
        <audio id="audio" controls>
            <source src="https://www.w3school.com.cn/i/horse.ogg" type="audio/ogg">
            您的浏览器不支持音频播放
        </audio>
    </div>
</div>

<script>
const voiceBtn = document.getElementById('voiceBtn');
const result = document.getElementById('result');
const warn = document.getElementById('warn');
const video = document.getElementById('video');
const audio = document.getElementById('audio');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

let recognition = null;
let isListening = false;
let shouldRestart = false;

// 检查运行环境
if (location.protocol === 'file:') {
    warn.textContent = '⚠️ 请通过 HTTPS 网页打开（不能直接用本地文件），否则手机无法使用语音识别';
} else if (!window.isSecureContext) {
    warn.textContent = '⚠️ 当前不是安全环境，语音识别可能无法使用';
}

function initRecognition() {
    if (!SpeechRecognition) {
        voiceBtn.disabled = true;
        result.textContent = '浏览器不支持语音识别，请使用 Android 版 Chrome';
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';

    // 关键修复：手机 Chrome 不支持 continuous，必须单次识别 + 自动重启
    recognition.continuous = !isMobile;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
        result.textContent = '正在监听，请说话...';
    };

    recognition.onresult = (event) => {
        // 关键修复：读取最新识别结果，而不是固定 results[0]
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        const command = transcript.trim();
        if (!command) return;

        result.textContent = '你说：' + command;
        executeCommand(command);
    };

    recognition.onerror = (event) => {
        console.error('语音识别错误:', event.error);

        switch (event.error) {
            case 'not-allowed':
                result.textContent = '麦克风权限被拒绝，请在浏览器设置中允许';
                stopListening();
                break;
            case 'no-speech':
                result.textContent = '没听到声音，继续监听中...';
                break;
            case 'network':
                result.textContent = '网络错误：语音识别需要联网';
                break;
            case 'aborted':
                break;
            default:
                result.textContent = '识别出错：' + event.error;
        }
    };

    recognition.onend = () => {
        // 关键修复：延迟重启，避免手机端报错或失效
        if (isListening && shouldRestart) {
            setTimeout(() => {
                try {
                    recognition.start();
                } catch (e) {
                    // 忽略重复 start 的错误
                }
            }, 300);
        }
    };
}

// 先申请麦克风权限（手机端更稳定）
async function requestMicPermission() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return true;
    }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
        return true;
    } catch (err) {
        result.textContent = '无法访问麦克风，请检查权限设置';
        return false;
    }
}

// 解锁移动端音视频播放限制（需要用户点击触发）
async function unlockMedia() {
    try {
        video.muted = true;
        await video.play();
        video.pause();
        video.muted = false;

        await audio.play();
        audio.pause();
    } catch (e) {
        // 部分浏览器可忽略
    }
}

function stopListening() {
    isListening = false;
    shouldRestart = false;
    try {
        recognition.stop();
    } catch (e) {}
    voiceBtn.textContent = '开启语音监听';
    voiceBtn.classList.remove('active');
}

function executeCommand(command) {
    const cmd = command.replace(/\s/g, '');

    if (cmd.includes('播放视频')) {
        video.play().catch(() => {
            result.textContent = '视频播放失败，请先手动点一次播放';
        });
    } else if (cmd.includes('暂停视频')) {
        video.pause();
    } else if (cmd.includes('播放音乐')) {
        audio.play().catch(() => {
            result.textContent = '音乐播放失败，请先手动点一次播放';
        });
    } else if (cmd.includes('暂停音乐')) {
        audio.pause();
    } else {
        result.textContent = '未识别命令：「' + command + '」，请说：播放视频 / 暂停视频 / 播放音乐 / 暂停音乐';
    }
}

voiceBtn.onclick = async () => {
    if (!recognition) return;

    if (isListening) {
        stopListening();
        result.textContent = '已关闭监听';
        return;
    }

    const micOk = await requestMicPermission();
    if (!micOk) return;

    await unlockMedia();

    try {
        isListening = true;
        shouldRestart = true;
        recognition.start();
        voiceBtn.textContent = '关闭语音监听';
        voiceBtn.classList.add('active');
    } catch (e) {
        isListening = false;
        shouldRestart = false;
        result.textContent = '启动失败，请刷新页面后重试';
    }
};

initRecognition();
</script>
</body>
</html>
