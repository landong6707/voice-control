<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音控制音视频</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; padding: 16px; background: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { margin: 16px 0; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; background: #fff; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        h3 { font-size: 16px; margin-bottom: 10px; }
        label { display: block; font-size: 13px; color: #64748b; margin-top: 8px; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        video, audio { width: 100%; margin-top: 10px; display: block; border-radius: 8px; }
        .voice-btn {
            padding: 14px 24px; font-size: 16px; background: #2563eb; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 320px;
        }
        .voice-btn.active { background: #dc2626; }
        .voice-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .tips { color: #64748b; font-size: 14px; line-height: 1.6; margin: 8px 0; }
        .result { color: #2563eb; font-weight: 600; font-size: 16px; margin: 10px 0; min-height: 22px; }
        .status { color: #64748b; font-size: 13px; line-height: 1.5; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 语音控制音视频</h1>
    <p class="tips">支持命令：播放视频、暂停视频、播放音乐、暂停音乐<br>开启后持续监听，断开会自动重连，无需反复点击。</p>

    <div class="card">
        <h3>🔑 讯飞语音识别</h3>
        <label>APPID</label>
        <input id="appId" value="bab98dfc">
        <label>APIKey</label>
        <input id="apiKey" value="e3a1bd8e628d45ac6214efd43cb1a32a">
        <label>APISecret</label>
        <input id="apiSecret" value="NjJlNTlhMDNiY2JhNjE2ZWYyYTYzN2M4">
    </div>

    <button class="voice-btn" id="voiceBtn">开启语音监听</button>
    <p class="result" id="result">等待开启...</p>
    <p class="status" id="status"></p>

    <div class="card">
        <h3>📽️ 视频</h3>
        <video id="video" controls playsinline webkit-playsinline>
            <source src="https://www.w3school.com.cn/i/movie.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <h3>🎵 音乐</h3>
        <audio id="audio" controls>
            <source src="https://www.w3school.com.cn/i/horse.ogg" type="audio/ogg">
        </audio>
    </div>
</div>

<script>
(function () {
    'use strict';

    const $ = id => document.getElementById(id);
    const voiceBtn = $('voiceBtn');
    const result = $('result');
    const statusEl = $('status');
    const video = $('video');
    const audio = $('audio');

    let isListening = false;      // 用户是否想持续监听
    let isBusy = false;
    let manualStop = false;       // 用户手动关闭
    let ws = null;
    let audioContext = null;
    let processor = null;
    let mediaStream = null;
    let sendInterval = null;
    let reconnectTimer = null;
    let isConnecting = false;
    let pcmBuffer = [];
    let frameStatus = 0;
    let fullText = '';
    let reconnectCount = 0;

    function setStatus(msg) {
        statusEl.innerHTML = isListening
            ? `<span class="dot"></span>${msg}`
            : msg;
        console.log('[status]', msg);
    }

    function getConfig() {
        return {
            appId: $('appId').value.trim(),
            apiKey: $('apiKey').value.trim(),
            apiSecret: $('apiSecret').value.trim()
        };
    }

    function unlockAudioContextSync() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!audioContext || audioContext.state === 'closed') audioContext = new Ctx();
        if (audioContext.state === 'suspended') audioContext.resume();
        try {
            const buf = audioContext.createBuffer(1, 1, 22050);
            const src = audioContext.createBufferSource();
            src.buffer = buf;
            src.connect(audioContext.destination);
            src.start(0);
        } catch (e) {}
    }

    async function waitAudioRunning(ms) {
        const t0 = Date.now();
        while (audioContext.state !== 'running') {
            if (Date.now() - t0 > ms) throw new Error('音频引擎启动超时，请换 Chrome');
            if (audioContext.state === 'suspended') await audioContext.resume();
            await new Promise(r => setTimeout(r, 50));
        }
    }

    async function hmacSha256Base64(secret, msg) {
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
        return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    async function getWebSocketUrl(apiKey, apiSecret) {
        const host = 'iat-api.xfyun.cn';
        const date = new Date().toUTCString();
        const origin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const sig = await hmacSha256Base64(apiSecret, origin);
        const auth = btoa(`api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${sig}"`);
        return `wss://${host}/v2/iat?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    function resampleTo16k(input, rate) {
        if (rate === 16000) return input;
        const ratio = rate / 16000;
        const len = Math.round(input.length / ratio);
        const out = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            const pos = i * ratio, idx = Math.floor(pos), f = pos - idx;
            const a = input[idx] || 0, b = input[idx + 1] || a;
            out[i] = a + (b - a) * f;
        }
        return out;
    }

    function floatTo16BitPCM(f32) {
        const buf = new ArrayBuffer(f32.length * 2);
        const v = new DataView(buf);
        for (let i = 0; i < f32.length; i++) {
            const s = Math.max(-1, Math.min(1, f32[i]));
            v.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function toBase64(buffer) {
        const b = new Uint8Array(buffer);
        let s = '';
        for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
        return btoa(s);
    }

    function mergeBuffers(list) {
        const total = list.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let off = 0;
        list.forEach(b => { out.set(new Uint8Array(b), off); off += b.byteLength; });
        return out.buffer;
    }

    function executeCommand(text) {
        const cmd = text.replace(/\s/g, '');
        if (cmd.includes('播放视频')) video.play().catch(() => {});
        else if (cmd.includes('暂停视频')) { video.pause(); result.textContent = '✅ 已暂停视频'; }
        else if (cmd.includes('播放音乐')) audio.play().catch(() => {});
        else if (cmd.includes('暂停音乐')) { audio.pause(); result.textContent = '✅ 已暂停音乐'; }
    }

    function parseResult(data) {
        const json = JSON.parse(data);
        if (json.code !== 0) {
            console.warn('讯飞错误', json);
            return;
        }
        if (!json.data || !json.data.result) return;

        let text = '';
        (json.data.result.ws || []).forEach(w => (w.cw || []).forEach(c => text += c.w));
        if (!text) return;

        if (json.data.result.pgs === 'rpl') {
            fullText = json.data.result.rg ? fullText.substring(0, json.data.result.rg[0]) + text : text;
        } else {
            fullText += text;
        }
        result.textContent = '你说：' + fullText;

        // 一句话识别完毕，执行命令，然后等 ws 断开后自动重连
        if (json.data.status === 2) {
            executeCommand(fullText);
            fullText = '';
        }
    }

    function sendFrame(base64, status) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const frame = {
            data: { status, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 }
        };
        if (status === 0) {
            frame.common = { app_id: getConfig().appId };
            frame.business = {
                language: 'zh_cn',
                domain: 'iat',
                accent: 'mandarin',
                vad_eos: 8000,   // 8秒静音才结束一句，减少频繁断开
                dwa: 'wpgs'
            };
        }
        ws.send(JSON.stringify(frame));
    }

    function startCapture() {
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        processor.onaudioprocess = e => {
            if (!isListening) return;
            pcmBuffer.push(floatTo16BitPCM(resampleTo16k(e.inputBuffer.getChannelData(0), audioContext.sampleRate)));
        };
        source.connect(processor);
        processor.connect(gain);
        gain.connect(audioContext.destination);
    }

    function startSendLoop() {
        if (sendInterval) return;
        sendInterval = setInterval(() => {
            if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
            const merged = pcmBuffer.length ? mergeBuffers(pcmBuffer) : new ArrayBuffer(0);
            pcmBuffer = [];
            sendFrame(merged.byteLength ? toBase64(merged) : '', frameStatus);
            if (frameStatus === 0) frameStatus = 1;
        }, 200);
    }

    function closeWSOnly() {
        if (!ws) return;
        ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
        try { if (ws.readyState <= 1) ws.close(); } catch (e) {}
        ws = null;
    }

    // ★ 核心：断开后自动重连，麦克风不中断
    function scheduleReconnect(reason) {
        if (!isListening || manualStop) return;
        clearTimeout(reconnectTimer);
        const delay = Math.min(500 + reconnectCount * 200, 2000);
        setStatus(`${reason}，${delay/1000}秒后自动重连...（第${reconnectCount+1}次）`);
        reconnectTimer = setTimeout(() => connectWebSocket(), delay);
    }

    async function connectWebSocket() {
        if (!isListening || manualStop || isConnecting) return;

        isConnecting = true;
        closeWSOnly();
        frameStatus = 0;
        fullText = '';

        try {
            const cfg = getConfig();
            ws = new WebSocket(await getWebSocketUrl(cfg.apiKey, cfg.apiSecret));

            ws.onopen = () => {
                isConnecting = false;
                reconnectCount = 0;
                setStatus('实时监听中，请随时说话...');
                startSendLoop();
            };

            ws.onmessage = e => { try { parseResult(e.data); } catch (err) { console.error(err); } };

            ws.onerror = () => {
                isConnecting = false;
                reconnectCount++;
                scheduleReconnect('连接异常');
            };

            ws.onclose = () => {
                isConnecting = false;
                if (isListening && !manualStop) {
                    reconnectCount++;
                    scheduleReconnect('会话结束');
                }
            };
        } catch (err) {
            isConnecting = false;
            reconnectCount++;
            scheduleReconnect('连接失败');
        }
    }

    function stopListening(showMsg) {
        manualStop = true;
        isListening = false;
        clearTimeout(reconnectTimer);
        reconnectTimer = null;

        clearInterval(sendInterval);
        sendInterval = null;

        closeWSOnly();

        if (processor) { processor.onaudioprocess = null; processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

        pcmBuffer = [];
        frameStatus = 0;
        fullText = '';
        reconnectCount = 0;
        isConnecting = false;
        isBusy = false;

        voiceBtn.textContent = '开启语音监听';
        voiceBtn.classList.remove('active');
        voiceBtn.disabled = false;

        if (showMsg) {
            result.textContent = '已关闭监听';
            setStatus('已停止');
        }
    }

    async function startListening() {
        if (isBusy) return;
        const cfg = getConfig();
        if (!cfg.appId || !cfg.apiKey || !cfg.apiSecret) {
            result.textContent = '请先填写讯飞密钥';
            return;
        }

        isBusy = true;
        voiceBtn.disabled = true;
        manualStop = false;
        isListening = true;

        try {
            setStatus('启动音频引擎...');
            await waitAudioRunning(5000);

            setStatus('申请麦克风...');
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            startCapture();
            voiceBtn.textContent = '关闭语音监听';
            voiceBtn.classList.add('active');
            voiceBtn.disabled = false;
            isBusy = false;

            // 首次连接 + 之后全靠自动重连
            await connectWebSocket();

        } catch (err) {
            result.textContent = err.message || '启动失败';
            stopListening(false);
        }
    }

    voiceBtn.onclick = async () => {
        if (isListening) {
            stopListening(true);
            return;
        }
        stopListening(false);
        try {
            unlockAudioContextSync();
        } catch (err) {
            result.textContent = err.message;
            return;
        }
        await startListening();
    };
})();
</script>
</body>
</html>
