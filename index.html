<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开幕式语音控制台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fff; color: #1a1a1a; min-height: 100vh; overflow-x: hidden;
        }
        .main { max-width: 820px; margin: 0 auto; padding: 80px 24px 140px; text-align: center; }
        .greeting { font-size: clamp(28px, 5vw, 42px); font-weight: 600; margin-bottom: 36px; color: #111; }
        .chips { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 16px; }
        .chip { padding: 10px 18px; background: #f5f5f5; border: 1px solid #eee; border-radius: 20px; font-size: 14px; color: #444; }
        .hint { margin-top: 40px; font-size: 14px; color: #999; line-height: 1.8; }
        .hint strong { color: #666; }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 20px 28px; background: linear-gradient(to top, #fff 70%, transparent);
            display: flex; justify-content: center; z-index: 100;
        }
        .input-box {
            width: 100%; max-width: 720px; background: #f7f7f8; border: 1px solid #e8e8e8;
            border-radius: 24px; padding: 14px 18px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.04);
        }
        .input-placeholder { flex: 1; text-align: left; font-size: 15px; color: #aaa; user-select: none; }
        .voice-status { font-size: 13px; color: #2563eb; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mic-btn {
            width: 44px; height: 44px; border: none; border-radius: 50%; background: #e8e8e8;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all .3s;
        }
        .mic-btn svg { width: 22px; height: 22px; fill: #888; }
        .mic-btn.active { background: linear-gradient(135deg, #ff4d4f, #ff7875); box-shadow: 0 0 0 4px rgba(255,77,79,.25); animation: micPulse 1.5s infinite; }
        .mic-btn.active svg { fill: #fff; }
        @keyframes micPulse { 0%,100%{box-shadow:0 0 0 4px rgba(255,77,79,.25)} 50%{box-shadow:0 0 0 8px rgba(255,77,79,.12)} }

        .config-toggle { position: fixed; top: 12px; right: 12px; font-size: 12px; color: #ccc; background: none; border: none; cursor: pointer; z-index: 200; }
        .config-panel {
            display: none; position: fixed; top: 40px; right: 12px; background: #fff; border: 1px solid #eee;
            border-radius: 12px; padding: 16px; width: 280px; z-index: 199; box-shadow: 0 8px 32px rgba(0,0,0,.1);
        }
        .config-panel.show { display: block; }
        .config-panel label { font-size: 12px; color: #888; display: block; margin-top: 8px; }
        .config-panel input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }

        /* 开幕式舞台 */
        .stage { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
        .stage.active { display: block; }
        .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; animation: particleFly linear forwards; }
        @keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
        .light-rays {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, transparent, rgba(255,200,50,.15), transparent, rgba(255,80,50,.12), transparent);
            animation: raysSpin 4s linear infinite; opacity: 0;
        }
        .stage.entering .light-rays { animation: raysSpin 4s linear infinite, raysIn .6s ease forwards; }
        @keyframes raysSpin { to { transform: rotate(360deg); } }
        @keyframes raysIn { from { opacity: 0; } to { opacity: 1; } }

        .curtain-left, .curtain-right {
            position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10;
            background: linear-gradient(135deg, #8b0000, #dc143c, #8b0000);
            transition: transform .8s cubic-bezier(.77,0,.18,1);
        }
        .curtain-left { left: 0; } .curtain-right { right: 0; }
        .stage.playing .curtain-left { transform: translateX(-100%); }
        .stage.playing .curtain-right { transform: translateX(100%); }

        .banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); z-index: 20; text-align: center; pointer-events: none; }
        .stage.entering .banner { animation: bannerPop .7s cubic-bezier(.34,1.56,.64,1) .1s forwards; }
        @keyframes bannerPop { 0%{transform:translate(-50%,-50%) scale(0);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
        .banner-title {
            font-size: clamp(36px, 8vw, 72px); font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ff0844, #ffd700);
            background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: goldShine 2s ease infinite;
        }
        .banner-sub { font-size: clamp(14px, 3vw, 22px); color: #ffd700; margin-top: 12px; letter-spacing: 2px; }
        @keyframes goldShine { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        .media-wrap {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            z-index: 5; opacity: 0; transform: scale(.5);
        }
        .stage.playing .media-wrap { animation: mediaZoom .6s cubic-bezier(.34,1.56,.64,1) forwards; }
        .stage.loaded .media-wrap { opacity: 1; transform: scale(1); }
        @keyframes mediaZoom { to { opacity: 1; transform: scale(1); } }

        #stageVideo { display: none; width: 100%; height: 100%; object-fit: contain; background: #000; }
        #stageVideo.active { display: block; }

        .loading-tip {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #ffd700; font-size: 18px; z-index: 6; display: none;
        }
        .stage.loading .loading-tip { display: block; }

        .audio-visual {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: radial-gradient(ellipse at center, #1a0a2e, #000);
        }
        .audio-visual.active { display: flex; }
        .visualizer { display: flex; align-items: flex-end; gap: 6px; height: 120px; margin-bottom: 40px; }
        .visualizer span { width: 8px; background: linear-gradient(to top, #ff0844, #ffd700); border-radius: 4px; animation: barDance .6s ease-in-out infinite alternate; }
        .visualizer span:nth-child(1){height:40px;animation-delay:0s}
        .visualizer span:nth-child(2){height:70px;animation-delay:.1s}
        .visualizer span:nth-child(3){height:100px;animation-delay:.2s}
        .visualizer span:nth-child(4){height:80px;animation-delay:.3s}
        .visualizer span:nth-child(5){height:110px;animation-delay:.4s}
        .visualizer span:nth-child(6){height:60px;animation-delay:.5s}
        .visualizer span:nth-child(7){height:90px;animation-delay:.6s}
        .visualizer span:nth-child(8){height:50px;animation-delay:.7s}
        @keyframes barDance { to { height: 120px; } }
        .audio-title { font-size: 28px; color: #ffd700; letter-spacing: 6px; font-weight: 700; }

        .close-btn {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            width: 44px; height: 44px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%;
            background: rgba(0,0,0,.5); color: #fff; font-size: 20px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        .stage.playing .close-btn, .stage.loaded .close-btn { display: flex; }

        /* 小熊吉祥物 */
        .mascot-zone {
            position: relative; width: 100%; height: clamp(220px, 34vh, 300px);
            margin: 20px auto 10px; border-radius: 20px;
            background: linear-gradient(180deg, #fafafa, #f5f7fa); border: 1px dashed #e2e8f0; overflow: hidden;
        }
        .bear-mascot {
            position: absolute; width: 120px; height: 150px; cursor: pointer; z-index: 50;
            transform-origin: center bottom; filter: drop-shadow(0 8px 16px rgba(0,0,0,.15));
        }
        .bear-mascot.hidden { opacity: 0; pointer-events: none; transition: opacity .4s; }
        .mascot-bubble {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) scale(0);
            background: #fff; border: 2px solid #e8e8e8; border-radius: 18px; padding: 10px 16px;
            font-size: 13px; white-space: nowrap; color: #333; box-shadow: 0 6px 20px rgba(0,0,0,.1);
            margin-bottom: 10px; opacity: 0; pointer-events: none;
        }
        .mascot-bubble.show { opacity: 1; transform: translateX(-50%) scale(1); transition: all .35s cubic-bezier(.34,1.56,.64,1); }
        .bear-svg { width: 100%; height: 100%; overflow: visible; }
        .bear-arm-right { transform-origin: 38px 108px; }
        .bear-leg-left { transform-origin: 68px 142px; }
        .bear-leg-right { transform-origin: 52px 142px; }
        .bear-mascot.walking .bear-leg-left { animation: legWalk .35s ease-in-out infinite alternate; }
        .bear-mascot.walking .bear-leg-right { animation: legWalk .35s ease-in-out infinite alternate-reverse; }
        @keyframes legWalk { from{transform:rotate(-15deg)} to{transform:rotate(15deg)} }
        .bear-mascot.waving .bear-arm-right { animation: armWave .45s ease-in-out infinite alternate; }
        @keyframes armWave { from{transform:rotate(-20deg)} to{transform:rotate(35deg)} }
        .bear-eye-l, .bear-eye-r { transform-origin: center; }
        .bear-mascot.blink .bear-eye-l, .bear-mascot.blink .bear-eye-r { animation: eyeBlink .15s ease; }
        @keyframes eyeBlink { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.08)} }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<button class="config-toggle" id="configToggle">⚙ 密钥</button>
<div class="config-panel" id="configPanel">
    <label>APPID</label><input id="appId" value="bab98dfc">
    <label>APIKey</label><input id="apiKey" value="e3a1bd8e628d45ac6214efd43cb1a32a">
    <label>APISecret</label><input id="apiSecret" value="NjJlNTlhMDNiY2JhNjE2ZWYyYTYzN2M4">
</div>

<div class="main">
    <h1 class="greeting">有什么我能帮你的吗？</h1>
    <div class="chips">
        <span class="chip">🎬 说「播放视频」开启开幕式</span>
        <span class="chip">🎵 说「播放音频」奏响乐章</span>
        <span class="chip">🎤 点击右下角麦克风开始监听</span>
    </div>
    <div class="mascot-zone" id="pandaZone">
        <div class="bear-mascot" id="pandaMascot" title="点击和我互动">
            <div class="mascot-bubble" id="pandaBubble">你好呀！👋</div>
            <svg class="bear-svg" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="skinGrad" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#ffe8d6"/><stop offset="100%" stop-color="#e8b896"/></radialGradient>
                    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff5252"/><stop offset="100%" stop-color="#d32f2f"/></linearGradient>
                    <linearGradient id="shortsGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3d5a80"/><stop offset="100%" stop-color="#1d3557"/></linearGradient>
                    <radialGradient id="eyeGrad" cx="35%" cy="30%" r="60%"><stop offset="0%" stop-color="#6d4c41"/><stop offset="100%" stop-color="#3e2723"/></radialGradient>
                </defs>
                <ellipse cx="60" cy="146" rx="28" ry="5" fill="rgba(0,0,0,.12)"/>
                <g class="bear-leg-left"><ellipse cx="68" cy="138" rx="11" ry="10" fill="url(#skinGrad)"/><rect x="57" y="118" width="22" height="18" rx="4" fill="url(#shortsGrad)"/></g>
                <g class="bear-leg-right"><ellipse cx="52" cy="138" rx="11" ry="10" fill="url(#skinGrad)"/><rect x="41" y="118" width="22" height="18" rx="4" fill="url(#shortsGrad)"/></g>
                <ellipse cx="88" cy="108" rx="10" ry="14" fill="url(#skinGrad)"/>
                <ellipse class="bear-arm-right" cx="32" cy="108" rx="10" ry="14" fill="url(#skinGrad)"/>
                <rect x="38" y="88" width="44" height="36" rx="10" fill="url(#shirtGrad)"/>
                <rect x="52" y="98" width="16" height="12" rx="2" fill="#fff"/>
                <circle cx="60" cy="52" r="38" fill="url(#skinGrad)"/>
                <circle cx="32" cy="24" r="12" fill="url(#skinGrad)"/><circle cx="88" cy="24" r="12" fill="url(#skinGrad)"/>
                <ellipse cx="60" cy="62" rx="18" ry="14" fill="#fff" opacity=".95"/>
                <ellipse cx="38" cy="58" rx="7" ry="4" fill="#ffb6c1" opacity=".55"/><ellipse cx="82" cy="58" rx="7" ry="4" fill="#ffb6c1" opacity=".55"/>
                <g class="bear-eye-l"><ellipse cx="48" cy="48" rx="9" ry="11" fill="url(#eyeGrad)"/><circle cx="50" cy="46" r="3.5" fill="#fff"/></g>
                <g class="bear-eye-r"><ellipse cx="72" cy="48" rx="9" ry="11" fill="url(#eyeGrad)"/><circle cx="74" cy="46" r="3.5" fill="#fff"/></g>
                <ellipse cx="60" cy="62" rx="4" ry="3.5" fill="#4e342e"/>
                <path d="M52 68 Q60 78 68 68" fill="#e57373"/><ellipse cx="60" cy="72" rx="5" ry="3" fill="#f48fb1"/>
            </svg>
        </div>
    </div>
    <p class="hint">点击右下角 <strong>麦克风</strong> 开启监听 · 说 <strong>「播放视频」</strong> 或 <strong>「播放音频」</strong></p>
</div>

<div class="bottom-bar">
    <div class="input-box">
        <span class="input-placeholder" id="placeholder">发消息或语音指令...</span>
        <span class="voice-status" id="voiceStatus"></span>
        <button class="mic-btn" id="micBtn" title="开启语音监听">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>
</div>

<div class="stage" id="stage">
    <div class="particles" id="particles"></div>
    <div class="light-rays"></div>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="banner">
        <div class="banner-title" id="bannerTitle">开幕式</div>
        <div class="banner-sub" id="bannerSub">精彩即将呈现</div>
    </div>
    <div class="loading-tip" id="loadingTip">正在加载媒体...</div>
    <div class="media-wrap">
        <video id="stageVideo" playsinline webkit-playsinline preload="auto"></video>
        <div class="audio-visual" id="audioVisual">
            <div class="visualizer"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            <div class="audio-title">🎵 盛典乐章</div>
        </div>
    </div>
    <button class="close-btn" id="closeBtn">✕</button>
    <audio id="stageAudio" preload="auto"></audio>
</div>

<script>
(function () {
    'use strict';

    // 国内可访问视频源优先
    const VIDEO_POOL = [
        { url: 'https://www.w3school.com.cn/example/html5/mov_bbb.mp4', title: 'Big Buck Bunny' },
        { url: 'https://www.w3school.com.cn/i/movie.mp4', title: 'W3School 示例影片' },
        { url: 'https://www.w3school.com.cn/example/html5/mov_bbb.mp4', title: 'Big Buck Bunny 备用' },
    ];

    const AUDIO_POOL = [
        { url: 'https://www.w3school.com.cn/i/horse.ogg', title: 'W3School 示例音乐' },
        { url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', title: 'SoundHelix 1' },
        { url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', title: 'SoundHelix 2' },
    ];

    const $ = id => document.getElementById(id);
    const micBtn = $('micBtn'), voiceStatus = $('voiceStatus'), placeholder = $('placeholder');
    const stage = $('stage'), stageVideo = $('stageVideo'), stageAudio = $('stageAudio');
    const audioVisual = $('audioVisual'), bannerTitle = $('bannerTitle'), bannerSub = $('bannerSub');
    const particles = $('particles'), closeBtn = $('closeBtn'), loadingTip = $('loadingTip');

    let isListening = false, isBusy = false, manualStop = false;
    let ws = null, audioContext = null, processor = null, mediaStream = null;
    let sendInterval = null, reconnectTimer = null, isConnecting = false;
    let pcmBuffer = [], frameStatus = 0, fullText = '', reconnectCount = 0;
    let ceremonyBusy = false, lastCmdTime = 0, mediaUnlocked = false;

    $('configToggle').onclick = () => $('configPanel').classList.toggle('show');
    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function getConfig() {
        return { appId: $('appId').value.trim(), apiKey: $('apiKey').value.trim(), apiSecret: $('apiSecret').value.trim() };
    }
    function setVoiceUI(text, listening) {
        voiceStatus.textContent = text || '';
        micBtn.classList.toggle('active', listening);
        placeholder.textContent = listening ? '正在监听语音指令...' : '发消息或语音指令...';
    }

    // ===== 解锁浏览器自动播放（麦克风点击时执行）=====
    async function unlockMediaPlayback() {
        if (mediaUnlocked) return;
        try {
            stageVideo.muted = true;
            stageVideo.src = VIDEO_POOL[0].url;
            stageVideo.load();
            await stageVideo.play();
            stageVideo.pause();
            stageVideo.removeAttribute('src');
            stageVideo.load();
            stageVideo.muted = false;
            await stageAudio.play().catch(() => {});
            stageAudio.pause();
            stageAudio.removeAttribute('src');
            mediaUnlocked = true;
        } catch (e) { console.warn('unlock media', e); }
    }

    function spawnParticles() {
        particles.innerHTML = '';
        const colors = ['#ffd700', '#ff6b35', '#ff0844', '#fff'];
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 10;
            p.style.cssText = `width:${size}px;height:${size}px;left:50%;top:50%;background:${colors[i%4]};--tx:${(Math.random()-.5)*600}px;--ty:${(Math.random()-.5)*600}px;animation-duration:${.8+Math.random()}s;`;
            particles.appendChild(p);
        }
    }

    function preloadVideo(url, timeoutMs) {
        return new Promise((resolve, reject) => {
            const timer = setTimeout(() => { cleanup(); reject(new Error('加载超时')); }, timeoutMs || 10000);
            const onCanPlay = () => { cleanup(); resolve(); };
            const onError = () => { cleanup(); reject(new Error('视频加载失败')); };
            const cleanup = () => {
                clearTimeout(timer);
                stageVideo.removeEventListener('canplay', onCanPlay);
                stageVideo.removeEventListener('error', onError);
            };
            stageVideo.src = url;
            stageVideo.load();
            if (stageVideo.readyState >= 3) onCanPlay();
            else {
                stageVideo.addEventListener('canplay', onCanPlay, { once: true });
                stageVideo.addEventListener('error', onError, { once: true });
            }
        });
    }

    async function loadVideoWithFallback() {
        const pool = [...VIDEO_POOL].sort(() => Math.random() - 0.5);
        let lastErr;
        for (const item of pool) {
            try {
                bannerSub.textContent = '正在加载：' + item.title;
                await preloadVideo(item.url, 8000);
                return item;
            } catch (e) { lastErr = e; console.warn('视频源失败', item.url, e); }
        }
        throw lastErr || new Error('所有视频源不可用');
    }

    function preloadAudio(url, timeoutMs) {
        return new Promise((resolve, reject) => {
            const timer = setTimeout(() => { cleanup(); reject(new Error('加载超时')); }, timeoutMs || 10000);
            const onCanPlay = () => { cleanup(); resolve(); };
            const onError = () => { cleanup(); reject(new Error('音频加载失败')); };
            const cleanup = () => {
                clearTimeout(timer);
                stageAudio.removeEventListener('canplay', onCanPlay);
                stageAudio.removeEventListener('error', onError);
            };
            stageAudio.src = url;
            stageAudio.load();
            if (stageAudio.readyState >= 3) onCanPlay();
            else {
                stageAudio.addEventListener('canplay', onCanPlay, { once: true });
                stageAudio.addEventListener('error', onError, { once: true });
            }
        });
    }

    async function loadAudioWithFallback() {
        const pool = [...AUDIO_POOL].sort(() => Math.random() - 0.5);
        for (const item of pool) {
            try {
                bannerSub.textContent = '正在加载：' + item.title;
                await preloadAudio(item.url, 8000);
                return item;
            } catch (e) { console.warn('音频源失败', item.url, e); }
        }
        throw new Error('所有音频源不可用');
    }

    async function safePlayVideo() {
        stageVideo.muted = true;
        try {
            await stageVideo.play();
            stageVideo.muted = false;
        } catch (e) {
            stageVideo.muted = false;
            await stageVideo.play();
        }
    }

    async function safePlayAudio() {
        try { await stageAudio.play(); }
        catch (e) { console.warn('audio play', e); throw e; }
    }

    function requestFullscreen(el) {
        const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.webkitEnterFullscreen;
        if (fn) fn.call(el).catch(() => {});
        else if (stageVideo.webkitEnterFullscreen) stageVideo.webkitEnterFullscreen();
    }

    function exitFullscreen() {
        const fn = document.exitFullscreen || document.webkitExitFullscreen;
        if (fn && (document.fullscreenElement || document.webkitFullscreenElement)) fn.call(document).catch(() => {});
    }

    function resetStageDOM() {
        stageVideo.pause();
        stageAudio.pause();
        stageVideo.removeAttribute('src');
        stageAudio.removeAttribute('src');
        stageVideo.load();
        stageAudio.load();
        stage.className = 'stage';
        stageVideo.classList.remove('active');
        audioVisual.classList.remove('active');
    }

    function closeCeremony(exitFs) {
        ceremonyBusy = false;
        resetStageDOM();
        if (exitFs) exitFullscreen();
        PandaMascot.show();
    }

    closeBtn.onclick = () => closeCeremony(true);

    // ===== 开幕式：先加载再播放，修复黑屏 =====
    async function openCeremony(type) {
        if (ceremonyBusy) return;
        ceremonyBusy = true;
        PandaMascot.hide();
        resetStageDOM();

        stage.className = 'stage active entering loading';
        spawnParticles();
        loadingTip.style.display = 'block';

        try {
            if (type === 'video') {
                bannerTitle.textContent = '🎬 开幕式';
                stageVideo.classList.add('active');
                audioVisual.classList.remove('active');

                const item = await loadVideoWithFallback();
                bannerSub.textContent = item.title;
                loadingTip.style.display = 'none';
                stage.classList.remove('loading');
                stage.classList.add('playing', 'loaded');

                await safePlayVideo();
                requestFullscreen(stageVideo);
                stageVideo.onended = () => closeCeremony(true);
            } else {
                bannerTitle.textContent = '🎵 音乐盛典';
                stageVideo.classList.remove('active');
                audioVisual.classList.add('active');

                const item = await loadAudioWithFallback();
                bannerSub.textContent = item.title;
                loadingTip.style.display = 'none';
                stage.classList.remove('loading');
                stage.classList.add('playing', 'loaded');

                await safePlayAudio();
                requestFullscreen(stage);
                stageAudio.onended = () => closeCeremony(true);
            }
        } catch (err) {
            console.error(err);
            loadingTip.textContent = '加载失败：' + (err.message || '请检查网络');
            bannerSub.textContent = '加载失败，3秒后关闭';
            ceremonyBusy = false;
            setTimeout(() => closeCeremony(true), 3000);
        }
    }

    // ===== 即时命令识别（不等8秒静音）=====
    function tryExecuteCommand(text) {
        if (!text || ceremonyBusy) return;
        const cmd = text.replace(/\s/g, '');
        const now = Date.now();
        if (now - lastCmdTime < 2000) return;

        if (cmd.includes('播放视频')) {
            lastCmdTime = now;
            fullText = '';
            setVoiceUI('🎬 检测到：播放视频', isListening);
            openCeremony('video');
        } else if (cmd.includes('播放音频') || cmd.includes('播放音乐')) {
            lastCmdTime = now;
            fullText = '';
            setVoiceUI('🎵 检测到：播放音频', isListening);
            openCeremony('audio');
        }
    }

    // ===== 讯飞语音识别 =====
    function unlockAudioContextSync() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!audioContext || audioContext.state === 'closed') audioContext = new Ctx();
        if (audioContext.state === 'suspended') audioContext.resume();
        try {
            const buf = audioContext.createBuffer(1, 1, 22050);
            const src = audioContext.createBufferSource();
            src.buffer = buf; src.connect(audioContext.destination); src.start(0);
        } catch (e) {}
    }

    async function waitAudioRunning(ms) {
        const t0 = Date.now();
        while (audioContext.state !== 'running') {
            if (Date.now() - t0 > ms) throw new Error('音频引擎启动超时');
            if (audioContext.state === 'suspended') await audioContext.resume();
            await new Promise(r => setTimeout(r, 50));
        }
    }

    async function hmacSha256Base64(secret, msg) {
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
        return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    async function getWebSocketUrl(apiKey, apiSecret) {
        const host = 'iat-api.xfyun.cn';
        const date = new Date().toUTCString();
        const origin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const sig = await hmacSha256Base64(apiSecret, origin);
        const auth = btoa(`api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${sig}"`);
        return `wss://${host}/v2/iat?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    function resampleTo16k(input, rate) {
        if (rate === 16000) return input;
        const ratio = rate / 16000, len = Math.round(input.length / ratio);
        const out = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            const pos = i * ratio, idx = Math.floor(pos), f = pos - idx;
            out[i] = (input[idx] || 0) + ((input[idx + 1] || input[idx] || 0) - (input[idx] || 0)) * f;
        }
        return out;
    }

    function floatTo16BitPCM(f32) {
        const buf = new ArrayBuffer(f32.length * 2);
        const v = new DataView(buf);
        for (let i = 0; i < f32.length; i++) {
            const s = Math.max(-1, Math.min(1, f32[i]));
            v.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function toBase64(buffer) {
        const b = new Uint8Array(buffer);
        let s = '';
        for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
        return btoa(s);
    }

    function mergeBuffers(list) {
        const total = list.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let off = 0;
        list.forEach(b => { out.set(new Uint8Array(b), off); off += b.byteLength; });
        return out.buffer;
    }

    function parseResult(data) {
        const json = JSON.parse(data);
        if (json.code !== 0 || !json.data || !json.data.result) return;
        let text = '';
        (json.data.result.ws || []).forEach(w => (w.cw || []).forEach(c => text += c.w));
        if (!text) return;

        if (json.data.result.pgs === 'rpl') {
            fullText = json.data.result.rg ? fullText.substring(0, json.data.result.rg[0]) + text : text;
        } else fullText += text;

        setVoiceUI('你说：' + fullText, isListening);

        // ★ 关键：识别到关键词立即执行，不等待 status===2
        tryExecuteCommand(fullText);

        if (json.data.status === 2) fullText = '';
    }

    function sendFrame(base64, status) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const frame = { data: { status, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } };
        if (status === 0) {
            frame.common = { app_id: getConfig().appId };
            frame.business = {
                language: 'zh_cn', domain: 'iat', accent: 'mandarin',
                vad_eos: 1500,  // ★ 从8000改为1500，大幅缩短等待
                dwa: 'wpgs'
            };
        }
        ws.send(JSON.stringify(frame));
    }

    function startCapture() {
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        processor.onaudioprocess = e => {
            if (!isListening) return;
            pcmBuffer.push(floatTo16BitPCM(resampleTo16k(e.inputBuffer.getChannelData(0), audioContext.sampleRate)));
        };
        source.connect(processor);
        processor.connect(gain);
        gain.connect(audioContext.destination);
    }

    function startSendLoop() {
        if (sendInterval) return;
        sendInterval = setInterval(() => {
            if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
            const merged = pcmBuffer.length ? mergeBuffers(pcmBuffer) : new ArrayBuffer(0);
            pcmBuffer = [];
            sendFrame(merged.byteLength ? toBase64(merged) : '', frameStatus);
            if (frameStatus === 0) frameStatus = 1;
        }, 200);
    }

    function closeWSOnly() {
        if (!ws) return;
        ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
        try { if (ws.readyState <= 1) ws.close(); } catch (e) {}
        ws = null;
    }

    function scheduleReconnect(reason) {
        if (!isListening || manualStop) return;
        clearTimeout(reconnectTimer);
        const delay = Math.min(500 + reconnectCount * 200, 2000);
        setVoiceUI(`${reason}，自动重连中...`, true);
        reconnectTimer = setTimeout(connectWebSocket, delay);
    }

    async function connectWebSocket() {
        if (!isListening || manualStop || isConnecting) return;
        isConnecting = true;
        closeWSOnly();
        frameStatus = 0;
        fullText = '';
        try {
            const cfg = getConfig();
            ws = new WebSocket(await getWebSocketUrl(cfg.apiKey, cfg.apiSecret));
            ws.onopen = () => { isConnecting = false; reconnectCount = 0; setVoiceUI('实时监听中', true); startSendLoop(); };
            ws.onmessage = e => { try { parseResult(e.data); } catch (err) {} };
            ws.onerror = () => { isConnecting = false; reconnectCount++; scheduleReconnect('连接异常'); };
            ws.onclose = () => { isConnecting = false; if (isListening && !manualStop) { reconnectCount++; scheduleReconnect('会话结束'); } };
        } catch (err) {
            isConnecting = false; reconnectCount++; scheduleReconnect('连接失败');
        }
    }

    function stopListening() {
        manualStop = true; isListening = false;
        clearTimeout(reconnectTimer);
        clearInterval(sendInterval); sendInterval = null;
        closeWSOnly();
        if (processor) { processor.onaudioprocess = null; processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        pcmBuffer = []; frameStatus = 0; fullText = ''; reconnectCount = 0;
        isConnecting = false; isBusy = false;
        setVoiceUI('', false);
    }

    async function startListening() {
        if (isBusy) return;
        const cfg = getConfig();
        if (!cfg.appId || !cfg.apiKey || !cfg.apiSecret) {
            setVoiceUI('请先配置讯飞密钥', false);
            $('configPanel').classList.add('show');
            return;
        }
        isBusy = true; manualStop = false; isListening = true;
        try {
            setVoiceUI('启动中...', true);
            await waitAudioRunning(5000);
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            startCapture();
            isBusy = false;
            await connectWebSocket();
        } catch (err) {
            setVoiceUI(err.message || '启动失败', false);
            stopListening();
        }
    }

    micBtn.onclick = async () => {
        if (isListening) { stopListening(); PandaMascot.say('有需要再叫我哦~'); return; }
        stopListening();
        try { unlockAudioContextSync(); } catch (e) { setVoiceUI('浏览器不支持音频', false); return; }
        await unlockMediaPlayback();
        await startListening();
        PandaMascot.say('我在听呢，请下达指令！');
    };

    // ===== 小熊吉祥物 =====
    const PandaMascot = (function () {
        const zone = $('pandaZone'), el = $('pandaMascot'), bubble = $('pandaBubble');
        const GREETINGS = ['你好呀！👋', '说「播放视频」试试~', '说「播放音频」有惊喜！', '点麦克风开始监听哦~'];
        let active = true, behaviorTimer = null, moveTween = null, idleTween = null;

        function bounds() {
            const pw = el.offsetWidth || 120, ph = el.offsetHeight || 150;
            return { minX: 10, maxX: zone.clientWidth - pw - 10, minY: 10, maxY: zone.clientHeight - ph - 10, pw, ph };
        }
        function setPos(x, y) { el.style.left = x + 'px'; el.style.top = y + 'px'; }
        function say(text, dur) {
            if (!active) return;
            bubble.textContent = text; bubble.classList.add('show');
            clearTimeout(say._t);
            say._t = setTimeout(() => bubble.classList.remove('show'), dur || 2800);
        }
        function clearAnims() {
            if (moveTween) { moveTween.kill(); moveTween = null; }
            if (idleTween) { idleTween.kill(); idleTween = null; }
            el.classList.remove('walking', 'waving');
            gsap.set(el, { x: 0, y: 0, rotation: 0 });
        }
        function blink() { if (!active) return; el.classList.add('blink'); setTimeout(() => el.classList.remove('blink'), 150); }
        function wave() {
            if (!active) return; clearAnims(); el.classList.add('waving');
            say('你好！👋');
            gsap.fromTo(el, { rotation: -5 }, { rotation: 5, duration: .3, yoyo: true, repeat: 5, ease: 'sine.inOut',
                onComplete: () => { el.classList.remove('waving'); gsap.set(el, { rotation: 0, x: 0, y: 0 }); scheduleBehavior(); }
            });
        }
        function walkToRandom() {
            if (!active) return; clearAnims();
            const b = bounds(), curX = parseFloat(el.style.left) || b.minX, curY = parseFloat(el.style.top) || b.minY;
            const tx = b.minX + Math.random() * (b.maxX - b.minX), ty = b.minY + Math.random() * (b.maxY - b.minY);
            el.classList.add('walking');
            gsap.set(el, { scaleX: tx >= curX ? 1 : -1 });
            moveTween = gsap.to(el, {
                left: tx, top: ty, duration: Math.max(1, Math.hypot(tx-curX, ty-curY) / 80), ease: 'power1.inOut',
                onComplete: () => { el.classList.remove('walking'); gsap.set(el, { x: 0, y: 0, rotation: 0 }); el.style.left = tx+'px'; el.style.top = ty+'px'; scheduleBehavior(); }
            });
        }
        function scheduleBehavior() {
            if (!active) return;
            clearTimeout(behaviorTimer);
            behaviorTimer = setTimeout(() => {
                Math.random() < .5 ? walkToRandom() : (say(GREETINGS[Math.floor(Math.random()*GREETINGS.length)]), wave());
            }, 1000 + Math.random() * 2000);
        }
        function init() {
            const b = bounds();
            setPos((zone.clientWidth - b.pw) / 2, (zone.clientHeight - b.ph) / 2);
            gsap.fromTo(el, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: .8, ease: 'back.out(2)', onComplete: () => { say('你好！我是开幕式小熊~'); scheduleBehavior(); } });
            el.onclick = e => { e.stopPropagation(); wave(); };
            setInterval(blink, 4000);
        }
        function hide() { active = false; clearTimeout(behaviorTimer); clearAnims(); bubble.classList.remove('show'); gsap.to(el, { opacity: 0, scale: .5, duration: .4, onComplete: () => el.classList.add('hidden') }); }
        function show() { el.classList.remove('hidden'); active = true; gsap.to(el, { opacity: 1, scale: 1, duration: .6, ease: 'back.out(1.7)', onComplete: () => { say('欢迎回来！'); scheduleBehavior(); } }); }
        return { init, hide, show, say, wave };
    })();

    if (typeof gsap !== 'undefined') PandaMascot.init();
})();
</script>
