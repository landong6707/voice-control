<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音控制音视频</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; padding: 16px; background: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { margin: 16px 0; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; background: #fff; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        h3 { font-size: 16px; margin-bottom: 10px; }
        label { display: block; font-size: 13px; color: #64748b; margin-top: 8px; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        video, audio { width: 100%; margin-top: 10px; display: block; border-radius: 8px; }
        .voice-btn {
            padding: 14px 24px; font-size: 16px; background: #2563eb; color: #fff;
            border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 320px;
        }
        .voice-btn.active { background: #dc2626; }
        .voice-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .tips { color: #64748b; font-size: 14px; line-height: 1.6; margin: 8px 0; }
        .result { color: #2563eb; font-weight: 600; font-size: 16px; margin: 10px 0; min-height: 22px; }
        .status { color: #64748b; font-size: 13px; line-height: 1.5; }
        .env-info { background: #f1f5f9; border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.6; }
        .warn { color: #dc2626; }
        .ok { color: #16a34a; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; margin-right: 6px; background: #e2e8f0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 语音控制音视频</h1>
    <p class="tips">支持命令：播放视频、暂停视频、播放音乐、暂停音乐</p>

    <div class="card">
        <h3>📱 当前环境</h3>
        <div class="env-info" id="envInfo">检测中...</div>
    </div>

    <div class="card">
        <h3>🔑 讯飞语音识别</h3>
        <label>APPID</label>
        <input id="appId" value="bab98dfc">
        <label>APIKey</label>
        <input id="apiKey" value="e3a1bd8e628d45ac6214efd43cb1a32a">
        <label>APISecret</label>
        <input id="apiSecret" value="NjJlNTlhMDNiY2JhNjE2ZWYyYTYzN2M4">
    </div>

    <button class="voice-btn" id="voiceBtn">开启语音监听</button>
    <p class="result" id="result">等待开启...</p>
    <p class="status" id="status"></p>

    <div class="card">
        <h3>📽️ 视频</h3>
        <video id="video" controls playsinline webkit-playsinline>
            <source src="https://www.w3school.com.cn/i/movie.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <h3>🎵 音乐</h3>
        <audio id="audio" controls>
            <source src="https://www.w3school.com.cn/i/horse.ogg" type="audio/ogg">
        </audio>
    </div>
</div>

<script>
(function () {
    'use strict';

    const $ = id => document.getElementById(id);
    const voiceBtn = $('voiceBtn');
    const result = $('result');
    const statusEl = $('status');
    const envInfo = $('envInfo');
    const video = $('video');
    const audio = $('audio');

    const UA = navigator.userAgent;
    const env = {
        isIOS: /iPhone|iPad|iPod/i.test(UA),
        isMac: /Macintosh|Mac OS X/i.test(UA),
        isSafari: /Safari/i.test(UA) && !/Chrome|CriOS|Edg|OPR/i.test(UA),
        isSecure: window.isSecureContext
    };

    let isListening = false;
    let isBusy = false;
    let manualStop = false;
    let ws = null;
    let audioContext = null;
    let processor = null;
    let mediaStream = null;
    let sendInterval = null;
    let pcmBuffer = [];
    let frameStatus = 0;
    let fullText = '';

    function setStatus(msg) {
        statusEl.textContent = msg;
        console.log('[status]', msg);
    }

    function getConfig() {
        return {
            appId: $('appId').value.trim(),
            apiKey: $('apiKey').value.trim(),
            apiSecret: $('apiSecret').value.trim()
        };
    }

    function detectEnvironment() {
        const os = env.isIOS ? 'iOS' : env.isMac ? 'macOS' : '其他';
        const browser = env.isSafari ? 'Safari' : 'Chrome/Edge 等';
        envInfo.innerHTML =
            `<span class="tag">${os}</span><span class="tag">${browser}</span><br>` +
            (env.isSecure ? '<div class="ok">✅ HTTPS 环境正常</div>' : '<div class="warn">⚠️ 请用 HTTPS 打开</div>') +
            (env.isSafari ? '<div class="warn">⚠️ Safari 对音频限制较多，Mac 建议优先用 Chrome</div>' : '');
    }

    // ===== 关键修复：在用户点击的同步阶段唤醒 AudioContext =====
    function unlockAudioContextSync() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) throw new Error('浏览器不支持 AudioContext');

        if (!audioContext || audioContext.state === 'closed') {
            audioContext = new Ctx();
        }

        // Safari 必须在点击瞬间 resume，不能等 getUserMedia 之后
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }

        // 播放静音 buffer，帮助 Mac Safari 真正启动
        try {
            const buffer = audioContext.createBuffer(1, 1, 22050);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start(0);
        } catch (e) {
            console.warn('silent buffer failed', e);
        }

        return audioContext;
    }

    async function waitAudioRunning(timeoutMs) {
        const start = Date.now();
        while (audioContext.state !== 'running') {
            if (Date.now() - start > timeoutMs) {
                throw new Error('音频引擎启动超时，请换 Chrome 或刷新页面');
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            await new Promise(r => setTimeout(r, 50));
        }
    }

    async function hmacSha256Base64(secret, message) {
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
        return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    async function getWebSocketUrl(apiKey, apiSecret) {
        const host = 'iat-api.xfyun.cn';
        const date = new Date().toUTCString();
        const signatureOrigin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const signature = await hmacSha256Base64(apiSecret, signatureOrigin);
        const authorization = btoa(`api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${signature}"`);
        return `wss://${host}/v2/iat?authorization=${encodeURIComponent(authorization)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    function resampleTo16k(input, sampleRate) {
        if (sampleRate === 16000) return input;
        const ratio = sampleRate / 16000;
        const len = Math.round(input.length / ratio);
        const out = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            const pos = i * ratio;
            const idx = Math.floor(pos);
            const frac = pos - idx;
            const a = input[idx] || 0;
            const b = input[idx + 1] || a;
            out[i] = a + (b - a) * frac;
        }
        return out;
    }

    function floatTo16BitPCM(float32) {
        const buf = new ArrayBuffer(float32.length * 2);
        const view = new DataView(buf);
        for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function toBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        return btoa(bin);
    }

    function mergeBuffers(list) {
        const total = list.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let offset = 0;
        list.forEach(b => { out.set(new Uint8Array(b), offset); offset += b.byteLength; });
        return out.buffer;
    }

    function executeCommand(text) {
        const cmd = text.replace(/\s/g, '');
        if (cmd.includes('播放视频')) video.play().catch(() => result.textContent = '请先手动点一次视频播放');
        else if (cmd.includes('暂停视频')) { video.pause(); result.textContent = '已暂停视频'; }
        else if (cmd.includes('播放音乐')) audio.play().catch(() => result.textContent = '请先手动点一次音乐播放');
        else if (cmd.includes('暂停音乐')) { audio.pause(); result.textContent = '已暂停音乐'; }
    }

    function parseResult(data) {
        const json = JSON.parse(data);
        if (json.code !== 0) { result.textContent = '识别错误：' + json.message; return; }
        if (!json.data || !json.data.result) return;
        let text = '';
        (json.data.result.ws || []).forEach(w => (w.cw || []).forEach(c => text += c.w));
        if (!text) return;
        if (json.data.result.pgs === 'rpl') {
            fullText = json.data.result.rg ? fullText.substring(0, json.data.result.rg[0]) + text : text;
        } else fullText += text;
        result.textContent = '你说：' + fullText;
        if (json.data.status === 2) { executeCommand(fullText); fullText = ''; }
    }

    function sendFrame(base64, status) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const frame = { data: { status, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } };
        if (status === 0) {
            frame.common = { app_id: getConfig().appId };
            frame.business = { language: 'zh_cn', domain: 'iat', accent: 'mandarin', vad_eos: 3000, dwa: 'wpgs' };
        }
        ws.send(JSON.stringify(frame));
    }

    function cleanupAudio() {
        clearInterval(sendInterval);
        sendInterval = null;
        if (processor) { processor.onaudioprocess = null; processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        pcmBuffer = [];
        frameStatus = 0;
    }

    function cleanupWS() {
        if (!ws) return;
        ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
        try { if (ws.readyState <= 1) ws.close(); } catch (e) {}
        ws = null;
    }

    function stopListening(showMsg) {
        manualStop = true;
        isListening = false;
        fullText = '';
        cleanupAudio();
        cleanupWS();
        voiceBtn.textContent = '开启语音监听';
        voiceBtn.classList.remove('active');
        voiceBtn.disabled = false;
        isBusy = false;
        if (showMsg) { result.textContent = '已关闭监听'; setStatus('已停止'); }
    }

    function startCapture() {
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        processor.onaudioprocess = e => {
            if (!isListening) return;
            const pcm = resampleTo16k(e.inputBuffer.getChannelData(0), audioContext.sampleRate);
            pcmBuffer.push(floatTo16BitPCM(pcm));
        };
        source.connect(processor);
        processor.connect(gain);
        gain.connect(audioContext.destination);
    }

    async function startListening() {
        if (isBusy) return;
        const cfg = getConfig();
        if (!cfg.appId || !cfg.apiKey || !cfg.apiSecret) {
            result.textContent = '请先填写讯飞密钥';
            return;
        }

        isBusy = true;
        voiceBtn.disabled = true;
        manualStop = false;

        try {
            // 步骤1：等待音频引擎（已在点击时同步唤醒）
            setStatus('启动音频引擎...');
            await waitAudioRunning(5000);
            setStatus('音频引擎已就绪：' + audioContext.state + ' / ' + audioContext.sampleRate + 'Hz');

            // 步骤2：再申请麦克风
            setStatus('申请麦克风中...');
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // 步骤3：连接讯飞
            setStatus('连接讯飞中...');
            cleanupWS();
            ws = new WebSocket(await getWebSocketUrl(cfg.apiKey, cfg.apiSecret));
            pcmBuffer = [];
            frameStatus = 0;
            fullText = '';

            ws.onopen = () => {
                setStatus('监听中，请说话...');
                result.textContent = '正在监听，请说：播放视频 / 暂停音乐';
                startCapture();
                sendInterval = setInterval(() => {
                    if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
                    const merged = pcmBuffer.length ? mergeBuffers(pcmBuffer) : new ArrayBuffer(0);
                    pcmBuffer = [];
                    sendFrame(merged.byteLength ? toBase64(merged) : '', frameStatus);
                    if (frameStatus === 0) frameStatus = 1;
                }, 200);
                isListening = true;
                voiceBtn.textContent = '关闭语音监听';
                voiceBtn.classList.add('active');
                voiceBtn.disabled = false;
                isBusy = false;
            };

            ws.onmessage = e => { try { parseResult(e.data); } catch (err) { console.error(err); } };
            ws.onerror = () => { result.textContent = '连接讯飞失败'; stopListening(false); };
            ws.onclose = () => {
                if (isListening && !manualStop) {
                    result.textContent = '连接断开，请重新开启';
                    stopListening(false);
                }
            };

        } catch (err) {
            result.textContent = err.message || ('启动失败：' + err.name);
            setStatus('出错，已重置');
            stopListening(false);
        }
    }

    voiceBtn.onclick = async () => {
        if (isListening) {
            stopListening(true);
            return;
        }

        stopListening(false);

        try {
            // ★ 最关键：点击瞬间就唤醒 AudioContext，不要放在 await 后面
            unlockAudioContextSync();
        } catch (err) {
            result.textContent = err.message;
            return;
        }

        await startListening();
    };

    detectEnvironment();
})();
</script>
</body>
</html>
