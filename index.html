<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>开幕式语音控制台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fcfcff url('assets/active-bg.jpg') center center / cover no-repeat fixed;
            color: #1a1a1a;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body.video-mode { overflow: hidden; background: #000; }
        body.video-mode .center-wrap,
        body.video-mode .config-toggle,
        body.video-mode .config-panel,
        body.video-mode .fade-overlay { visibility: hidden; pointer-events: none; }

        body.transitioning .center-wrap {
            opacity: 0;
            transform: scale(0.98);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* 整体居中：GIF 在上，输入框在下 */
        .center-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(24px, 5vh, 40px);
            width: 100%;
            max-width: 720px;
            padding: 24px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .mascot-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .mascot-bubble {
            position: absolute;
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(6px) scale(0.92);
            background: #fff;
            border: 1px solid #eaeaef;
            border-radius: 18px;
            padding: 12px 22px;
            font-size: 15px;
            color: #555;
            box-shadow: 0 6px 24px rgba(120, 120, 160, 0.1);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.34, 1.4, 0.64, 1);
            z-index: 10;
        }

        .mascot-bubble.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .mascot-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            background: #fff;
            border-right: 1px solid #eaeaef;
            border-bottom: 1px solid #eaeaef;
        }

        .mascot-wrap.hidden {
            opacity: 0;
            transform: scale(.9);
            pointer-events: none;
        }

        .mascot-wrap img {
            width: clamp(180px, 40vw, 280px);
            height: auto;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .input-box {
            width: 100%;
            background: #fff;
            border: 1px solid #eaeaef;
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 16px rgba(120, 120, 160, 0.06);
        }

        .input-placeholder {
            flex: 1;
            text-align: left;
            font-size: 15px;
            color: #b0b0bc;
            user-select: none;
        }

        .mic-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #e8e8e8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .3s;
        }

        .mic-btn svg { width: 22px; height: 22px; fill: #888; transition: fill .3s; }

        .mic-btn.active {
            background: linear-gradient(135deg, #7c8aff, #9aa5ff);
            box-shadow: 0 0 0 4px rgba(124, 138, 255, 0.22);
            animation: micPulse 1.5s ease-in-out infinite;
        }

        .mic-btn.active svg { fill: #fff; }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(124, 138, 255, 0.22); }
            50% { box-shadow: 0 0 0 8px rgba(124, 138, 255, 0.1); }
        }

        .config-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            font-size: 12px;
            color: #ccc;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 200;
        }

        .config-panel {
            display: none;
            position: fixed;
            top: 40px;
            right: 12px;
            background: #fcfcff;
            border: 1px solid #eaeaef;
            border-radius: 12px;
            padding: 16px;
            width: 280px;
            z-index: 199;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .1);
        }

        .config-panel.show { display: block; }
        .config-panel label { font-size: 12px; color: #888; display: block; margin-top: 8px; }
        .config-panel input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        /* 柔和淡化过渡层 */
        .fade-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: #fcfcff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.4s ease-in-out, background 1.4s ease-in-out;
        }

        .fade-overlay.active {
            opacity: 1;
            background: #000;
            pointer-events: all;
        }

        /* 开幕式全屏舞台 — 播放时整屏只有视频 */
        .stage {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            z-index: 1000;
            background: #000;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .stage.active { display: block; }
        .stage.visible { opacity: 1; }

        .stage.video-only .particles,
        .stage.video-only .light-rays,
        .stage.video-only .curtain-left,
        .stage.video-only .curtain-right,
        .stage.video-only .banner,
        .stage.video-only .loading-tip { display: none !important; }

        .stage.video-only .media-wrap {
            opacity: 1 !important;
            transform: none !important;
            animation: none !important;
        }

        .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; animation: particleFly linear forwards; }
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .light-rays {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, transparent, rgba(255,200,50,.15), transparent, rgba(255,80,50,.12), transparent);
            animation: raysSpin 4s linear infinite;
            opacity: 0;
        }

        .stage.entering .light-rays { animation: raysSpin 4s linear infinite, raysIn .6s ease forwards; }
        @keyframes raysSpin { to { transform: rotate(360deg); } }
        @keyframes raysIn { from { opacity: 0; } to { opacity: 1; } }

        .curtain-left, .curtain-right {
            position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10;
            background: linear-gradient(135deg, #8b0000, #dc143c, #8b0000);
            transition: transform .8s cubic-bezier(.77, 0, .18, 1);
        }

        .curtain-left { left: 0; }
        .curtain-right { right: 0; }
        .stage.playing .curtain-left { transform: translateX(-100%); }
        .stage.playing .curtain-right { transform: translateX(100%); }

        .banner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20; text-align: center; pointer-events: none;
        }

        .stage.entering .banner { animation: bannerPop .7s cubic-bezier(.34, 1.56, .64, 1) .1s forwards; }
        @keyframes bannerPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .banner-title {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ff0844, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 2s ease infinite;
        }

        .banner-sub { font-size: clamp(14px, 3vw, 22px); color: #ffd700; margin-top: 12px; letter-spacing: 2px; }
        @keyframes goldShine { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .media-wrap {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; opacity: 0; transform: scale(.5);
        }

        .stage.playing .media-wrap { animation: mediaZoom .6s cubic-bezier(.34, 1.56, .64, 1) forwards; }
        .stage.loaded .media-wrap { opacity: 1; transform: scale(1); }
        @keyframes mediaZoom { to { opacity: 1; transform: scale(1); } }

        #stageVideo {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        #stageVideo.active { display: block; }
        .stage.playing #stageVideo.active { opacity: 1; }

        .loading-tip {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #b0b0bc; font-size: 16px; z-index: 6;
            display: none;
        }

        .stage.loading .loading-tip { display: block; }

        /* 微信等内置浏览器提示 */
        .browser-tip {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(252, 252, 255, 0.96);
            color: #444;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
            line-height: 1.8;
        }

        .browser-tip.show { display: flex; }

        .browser-tip p { font-size: 16px; max-width: 320px; }
        .browser-tip strong { color: #6b7aff; font-size: 18px; }
        .browser-tip .arrow {
            position: absolute;
            top: 12px;
            right: 24px;
            font-size: 36px;
            animation: tipBounce 1s ease-in-out infinite;
        }

        @keyframes tipBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

<button class="config-toggle" id="configToggle">⚙ 密钥</button>
<div class="config-panel" id="configPanel">
    <label>APPID</label><input id="appId" value="bab98dfc">
    <label>APIKey</label><input id="apiKey" value="e3a1bd8e628d45ac6214efd43cb1a32a">
    <label>APISecret</label><input id="apiSecret" value="NjJlNTlhMDNiY2JhNjE2ZWYyYTYzN2M4">
</div>

<div class="fade-overlay" id="fadeOverlay"></div>

<div class="browser-tip" id="browserTip">
    <div class="arrow">↗</div>
    <p><strong>请用系统浏览器打开</strong><br>微信/QQ 内置浏览器可能无法正常访问<br>点击右上角 <strong>···</strong> → 选择「在浏览器打开」<br>推荐使用 Chrome 或 Safari</p>
</div>

<div class="center-wrap">
    <div class="mascot-wrap" id="mascotWrap">
        <div class="mascot-bubble" id="mascotBubble"></div>
        <img id="mascotGif" src="assets/mascot.gif" alt="吉祥物">
    </div>
    <div class="input-box">
        <span class="input-placeholder" id="placeholder">发消息...</span>
        <button class="mic-btn" id="micBtn" title="开启语音监听">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>
</div>

<div class="stage" id="stage">
    <div class="particles" id="particles"></div>
    <div class="light-rays"></div>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="banner">
        <div class="banner-title" id="bannerTitle">开幕式</div>
        <div class="banner-sub" id="bannerSub">精彩即将呈现</div>
    </div>
    <div class="loading-tip" id="loadingTip">正在加载视频...</div>
    <div class="media-wrap">
        <video id="stageVideo" playsinline webkit-playsinline x5-playsinline preload="auto"></video>
    </div>
    <audio id="stageMusic" preload="auto"></audio>
</div>

<script>
(function () {
    'use strict';

    const ASSETS = {
        bg: 'assets/active-bg.jpg',
        mascot: 'assets/mascot.gif',
        video: 'assets/video.mp4',
        music: 'assets/music.mp3'
    };

    const BEAR_REPLIES = [
        '收到！精彩即将开始～',
        '好的，马上为您播放！',
        '遵命，开幕式来啦！'
    ];

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
    const isQQ = /\bQQ\//i.test(navigator.userAgent);
    const isInAppBrowser = isWeChat || isQQ;

    const $ = id => document.getElementById(id);
    const micBtn = $('micBtn');
    const placeholder = $('placeholder');
    const mascotWrap = $('mascotWrap');
    const mascotBubble = $('mascotBubble');
    const fadeOverlay = $('fadeOverlay');
    const stage = $('stage');
    const stageVideo = $('stageVideo');
    const stageMusic = $('stageMusic');
    const bannerTitle = $('bannerTitle');
    const bannerSub = $('bannerSub');
    const particles = $('particles');
    const loadingTip = $('loadingTip');
    const browserTip = $('browserTip');

    let isListening = false, isBusy = false, manualStop = false;
    let ws = null, audioContext = null, processor = null, mediaStream = null;
    let sendInterval = null, reconnectTimer = null, isConnecting = false;
    let pcmBuffer = [], frameStatus = 0, fullText = '', reconnectCount = 0;
    let ceremonyBusy = false, lastCmdTime = 0, mediaUnlocked = false;
    let mediaPreloaded = false;

    $('configToggle').onclick = () => $('configPanel').classList.toggle('show');

    function getConfig() {
        return {
            appId: $('appId').value.trim(),
            apiKey: $('apiKey').value.trim(),
            apiSecret: $('apiSecret').value.trim()
        };
    }

    function setVoiceUI(listening) {
        micBtn.classList.toggle('active', listening);
        placeholder.textContent = listening ? '正在监听...' : '发消息...';
    }

    function hideMascot() { mascotWrap.classList.add('hidden'); }
    function showMascot() {
        mascotWrap.classList.remove('hidden');
        hideMascotReply();
    }

    function showMascotReply(text) {
        mascotBubble.textContent = text;
        mascotBubble.classList.add('show');
    }

    function hideMascotReply() {
        mascotBubble.classList.remove('show');
    }

    function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    async function playFadeTransition() {
        document.body.classList.add('transitioning');
        fadeOverlay.classList.add('active');
        await delay(1400);
    }

    async function ensureMediaReady() {
        if (mediaPreloaded && stageVideo.readyState >= 3) return;
        await preloadMedia();
    }

    async function unlockMediaPlayback() {
        if (mediaUnlocked) return;
        try {
            stageVideo.muted = true;
            stageVideo.src = ASSETS.video;
            stageVideo.load();
            await stageVideo.play();
            stageVideo.pause();
            stageVideo.currentTime = 0;
            stageVideo.muted = false;

            stageMusic.src = ASSETS.music;
            stageMusic.load();
            await stageMusic.play();
            stageMusic.pause();
            stageMusic.currentTime = 0;

            mediaUnlocked = true;
        } catch (e) { console.warn('unlock media', e); }
    }

    function waitMediaCanPlay(el, timeoutMs) {
        return new Promise((resolve, reject) => {
            if (el.readyState >= 3) { resolve(); return; }
            const timer = setTimeout(() => { cleanup(); reject(new Error('加载超时')); }, timeoutMs || 8000);
            const onReady = () => { cleanup(); resolve(); };
            const onError = () => { cleanup(); reject(new Error('媒体加载失败')); };
            const cleanup = () => {
                clearTimeout(timer);
                el.removeEventListener('canplay', onReady);
                el.removeEventListener('error', onError);
            };
            el.addEventListener('canplay', onReady, { once: true });
            el.addEventListener('error', onError, { once: true });
        });
    }

    /* 开启麦克风后预加载本地视频和音乐 */
    function startMediaPreload() {
        if (ceremonyBusy || mediaPreloaded) return;
        preloadMedia().catch(() => {});
    }

    async function preloadMedia() {
        stageVideo.src = ASSETS.video;
        stageVideo.load();
        stageMusic.src = ASSETS.music;
        stageMusic.load();
        await Promise.all([
            waitMediaCanPlay(stageVideo, 8000),
            waitMediaCanPlay(stageMusic, 8000)
        ]);
        mediaPreloaded = true;
    }

    async function playCeremonyMedia() {
        stageVideo.currentTime = 0;
        stageMusic.currentTime = 0;
        stageVideo.muted = true;
        try {
            await Promise.all([stageVideo.play(), stageMusic.play()]);
            stageVideo.muted = false;
        } catch (e) {
            stageVideo.muted = false;
            await Promise.all([stageVideo.play(), stageMusic.play()]);
        }
    }

    function spawnParticles() {
        particles.innerHTML = '';
        const colors = ['#ffd700', '#ff6b35', '#ff0844', '#fff'];
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 10;
            p.style.cssText = `width:${size}px;height:${size}px;left:50%;top:50%;background:${colors[i % 4]};--tx:${(Math.random() - .5) * 600}px;--ty:${(Math.random() - .5) * 600}px;animation-duration:${.8 + Math.random()}s;`;
            particles.appendChild(p);
        }
    }

    function resetStageDOM() {
        stageVideo.pause();
        stageMusic.pause();
        stageVideo.onended = null;
        stage.className = 'stage';
        stageVideo.classList.remove('active');
        document.body.classList.remove('video-mode', 'transitioning');
        fadeOverlay.classList.remove('active');
        if (stageVideo.src) stageVideo.currentTime = 0;
        if (stageMusic.src) stageMusic.currentTime = 0;
    }

    async function enterVideoFullscreen() {
        const v = stageVideo;
        document.body.classList.add('video-mode');
        stage.classList.add('video-only');

        if (isIOS && typeof v.webkitEnterFullscreen === 'function') {
            v.removeAttribute('playsinline');
            v.playsInline = false;
            v.webkitEnterFullscreen();
            return;
        }

        const targets = [document.documentElement, stage, v];
        for (const el of targets) {
            const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (!fn) continue;
            try {
                await fn.call(el);
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
                return;
            } catch (e) { /* 尝试下一个 */ }
        }
    }

    function exitFullscreen() {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
        const fn = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
        if (fn && (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement)) {
            fn.call(document).catch(() => {});
        }
        document.body.classList.remove('video-mode');
        stage.classList.remove('video-only');
        stageVideo.setAttribute('playsinline', '');
        stageVideo.setAttribute('webkit-playsinline', '');
        stageVideo.playsInline = true;
    }

    function closeCeremony(exitFs) {
        ceremonyBusy = false;
        resetStageDOM();
        if (exitFs) exitFullscreen();
        showMascot();
    }

    stageVideo.addEventListener('webkitendfullscreen', () => closeCeremony(false));

    async function openCeremony() {
        if (ceremonyBusy) return;
        ceremonyBusy = true;

        const reply = BEAR_REPLIES[Math.floor(Math.random() * BEAR_REPLIES.length)];
        showMascotReply(reply);
        placeholder.textContent = reply;

        const mediaReady = ensureMediaReady();

        /* 熊先说话，再柔和淡化进入视频 */
        await delay(2200);
        hideMascotReply();
        hideMascot();

        stage.className = 'stage active loading video-only';
        stageVideo.classList.add('active');
        loadingTip.style.display = 'block';
        loadingTip.textContent = '正在准备...';

        await playFadeTransition();

        try {
            await mediaReady;
            loadingTip.style.display = 'none';
            stage.classList.add('visible', 'playing', 'loaded', 'video-only');
            document.body.classList.add('video-mode');

            await playCeremonyMedia();
            await enterVideoFullscreen();
            stageVideo.onended = () => closeCeremony(true);
        } catch (err) {
            console.error(err);
            loadingTip.textContent = '加载失败：' + (err.message || '请检查 assets 资源');
            ceremonyBusy = false;
            setTimeout(() => closeCeremony(true), 3000);
        }
    }

    function hasPublishCommand(text) {
        if (!text) return false;
        const t = text.replace(/[\s，。！？、,.!?\-]/g, '');
        return t.includes('发布');
    }

    /* 识别到「发布」立即触发，不等整句说完、不等静音结束 */
    function triggerCeremony() {
        if (ceremonyBusy) return;
        lastCmdTime = Date.now();
        fullText = '';
        openCeremony();
    }

    function tryExecuteCommand(text) {
        if (!text || ceremonyBusy) return;
        if (!hasPublishCommand(text)) return;
        triggerCeremony();
    }

    function formatMicError(err) {
        const name = err && err.name;
        if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
            return '麦克风被拒绝，请点击地址栏锁图标允许麦克风';
        }
        if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
            return '未检测到麦克风，请检查 Windows 声音设置';
        }
        if (name === 'NotReadableError' || name === 'TrackStartError') {
            return '麦克风被占用，请关闭其他录音软件后重试';
        }
        if (name === 'SecurityError' || name === 'NotSupportedError') {
            return '请用 https 或 localhost 打开（本地文件无法使用麦克风）';
        }
        return (err && err.message) || '启动失败';
    }

    async function ensureAudioContextReady() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) throw new Error('当前浏览器不支持音频引擎');
        if (!audioContext || audioContext.state === 'closed') audioContext = new Ctx();
        const deadline = Date.now() + 3000;
        while (audioContext.state !== 'running') {
            if (Date.now() > deadline) throw new Error('音频引擎启动超时，请重试');
            if (audioContext.state === 'suspended') await audioContext.resume();
            await new Promise(r => setTimeout(r, 40));
        }
    }

    /* 必须在用户点击后立刻调用，不能先 await 其他耗时操作 */
    async function requestMicrophone() {
        if (!window.isSecureContext) {
            throw new Error('请用 https 或 localhost 打开（本地 file:// 无法使用麦克风）');
        }
        const md = navigator.mediaDevices;
        if (!md || typeof md.getUserMedia !== 'function') {
            throw new Error('当前浏览器不支持麦克风，请用 Chrome 或 Edge');
        }
        return md.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        });
    }

    async function hmacSha256Base64(secret, msg) {
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
        return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    async function getWebSocketUrl(apiKey, apiSecret) {
        const host = 'iat-api.xfyun.cn';
        const date = new Date().toUTCString();
        const origin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const sig = await hmacSha256Base64(apiSecret, origin);
        const auth = btoa(`api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${sig}"`);
        return `wss://${host}/v2/iat?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    function resampleTo16k(input, rate) {
        if (rate === 16000) return input;
        const ratio = rate / 16000;
        const len = Math.round(input.length / ratio);
        const out = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            const pos = i * ratio, idx = Math.floor(pos), f = pos - idx;
            out[i] = (input[idx] || 0) + ((input[idx + 1] || input[idx] || 0) - (input[idx] || 0)) * f;
        }
        return out;
    }

    function floatTo16BitPCM(f32) {
        const buf = new ArrayBuffer(f32.length * 2);
        const v = new DataView(buf);
        for (let i = 0; i < f32.length; i++) {
            const s = Math.max(-1, Math.min(1, f32[i]));
            v.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function toBase64(buffer) {
        const b = new Uint8Array(buffer);
        let s = '';
        for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
        return btoa(s);
    }

    function mergeBuffers(list) {
        const total = list.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let off = 0;
        list.forEach(b => { out.set(new Uint8Array(b), off); off += b.byteLength; });
        return out.buffer;
    }

    function parseResult(data) {
        const json = JSON.parse(data);
        if (json.code !== 0 || !json.data || !json.data.result) return;

        let text = '';
        (json.data.result.ws || []).forEach(w => (w.cw || []).forEach(c => text += c.w));
        if (!text) return;

        /* 先合并文本再检测，确保「发」「布」分片到达时也能立刻触发 */
        if (json.data.result.pgs === 'rpl') {
            fullText = json.data.result.rg ? fullText.substring(0, json.data.result.rg[0]) + text : text;
        } else {
            fullText += text;
        }

        tryExecuteCommand(text);
        tryExecuteCommand(fullText);

        if (json.data.status === 2) fullText = '';
    }

    function sendFrame(base64, status) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const frame = { data: { status, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } };
        if (status === 0) {
            frame.common = { app_id: getConfig().appId };
            frame.business = {
                language: 'zh_cn', domain: 'iat', accent: 'mandarin',
                vad_eos: 500,
                dwa: 'wpgs',
                dhw: '发布'
            };
        }
        ws.send(JSON.stringify(frame));
    }

    function startCapture() {
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        processor.onaudioprocess = e => {
            if (!isListening) return;
            pcmBuffer.push(floatTo16BitPCM(resampleTo16k(e.inputBuffer.getChannelData(0), audioContext.sampleRate)));
        };
        source.connect(processor);
        processor.connect(gain);
        gain.connect(audioContext.destination);
    }

    function startSendLoop() {
        if (sendInterval) return;
        sendInterval = setInterval(() => {
            if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
            const merged = pcmBuffer.length ? mergeBuffers(pcmBuffer) : new ArrayBuffer(0);
            pcmBuffer = [];
            sendFrame(merged.byteLength ? toBase64(merged) : '', frameStatus);
            if (frameStatus === 0) frameStatus = 1;
        }, 200);
    }

    function closeWSOnly() {
        if (!ws) return;
        ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
        try { if (ws.readyState <= 1) ws.close(); } catch (e) {}
        ws = null;
    }

    function scheduleReconnect(reason) {
        if (!isListening || manualStop) return;
        clearTimeout(reconnectTimer);
        const delay = Math.min(500 + reconnectCount * 200, 2000);
        placeholder.textContent = '重连中...';
        reconnectTimer = setTimeout(connectWebSocket, delay);
    }

    async function connectWebSocket() {
        if (!isListening || manualStop || isConnecting) return;
        isConnecting = true;
        closeWSOnly();
        frameStatus = 0;
        fullText = '';
        try {
            const cfg = getConfig();
            ws = new WebSocket(await getWebSocketUrl(cfg.apiKey, cfg.apiSecret));
            ws.onopen = () => {
                isConnecting = false;
                reconnectCount = 0;
                setVoiceUI(true);
                startSendLoop();
                startMediaPreload();
            };
            ws.onmessage = e => { try { parseResult(e.data); } catch (err) {} };
            ws.onerror = () => { isConnecting = false; reconnectCount++; scheduleReconnect('异常'); };
            ws.onclose = () => {
                isConnecting = false;
                if (isListening && !manualStop) { reconnectCount++; scheduleReconnect('断开'); }
            };
        } catch (err) {
            isConnecting = false;
            reconnectCount++;
            scheduleReconnect('失败');
        }
    }

    function stopListening() {
        manualStop = true;
        isListening = false;
        clearTimeout(reconnectTimer);
        clearInterval(sendInterval);
        sendInterval = null;
        closeWSOnly();
        if (processor) { processor.onaudioprocess = null; processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        pcmBuffer = [];
        frameStatus = 0;
        fullText = '';
        reconnectCount = 0;
        isConnecting = false;
        isBusy = false;
        setVoiceUI(false);
    }

    async function startListening(stream) {
        if (isBusy) return;
        const cfg = getConfig();
        if (!cfg.appId || !cfg.apiKey || !cfg.apiSecret) {
            placeholder.textContent = '请先配置讯飞密钥';
            $('configPanel').classList.add('show');
            stream.getTracks().forEach(t => t.stop());
            micBtn.classList.remove('active');
            return;
        }
        isBusy = true;
        manualStop = false;
        isListening = true;
        mediaStream = stream;
        try {
            placeholder.textContent = '启动中...';
            await ensureAudioContextReady();
            startCapture();
            isBusy = false;
            startMediaPreload();
            unlockMediaPlayback().catch(() => {});
            await connectWebSocket();
        } catch (err) {
            placeholder.textContent = formatMicError(err);
            stopListening();
        }
    }

    micBtn.onclick = async () => {
        if (isListening) { stopListening(); return; }
        if (isBusy) return;

        isBusy = true;
        manualStop = false;
        placeholder.textContent = '请求麦克风权限...';
        micBtn.classList.add('active');

        try {
            /* 关键：在用户点击瞬间立即请求麦克风，避免 await 视频加载导致手势失效 */
            const stream = await requestMicrophone();
            isBusy = false;
            await startListening(stream);
        } catch (err) {
            placeholder.textContent = formatMicError(err);
            micBtn.classList.remove('active');
            isBusy = false;
            manualStop = true;
            isListening = false;
        }
    };

    if (!window.isSecureContext) {
        placeholder.textContent = '请用 https 或 localhost 打开此页面';
    } else if (isInAppBrowser) {
        browserTip.classList.add('show');
        placeholder.textContent = '请用系统浏览器打开';
    } else if (!window.crypto || !window.crypto.subtle) {
        placeholder.textContent = '请用 Chrome 或 Safari 打开';
    }
})();
</script>
</body>
</html>
