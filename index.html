<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开幕式语音控制台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 整体居中：GIF 在上，输入框在下 */
        .center-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(24px, 5vh, 40px);
            width: 100%;
            max-width: 720px;
            padding: 24px;
        }

        .mascot-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity .4s, transform .4s;
        }

        .mascot-wrap.hidden {
            opacity: 0;
            transform: scale(.9);
            pointer-events: none;
        }

        .mascot-wrap img {
            width: clamp(180px, 40vw, 280px);
            height: auto;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .input-box {
            width: 100%;
            background: #f7f7f8;
            border: 1px solid #e8e8e8;
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.04);
        }

        .input-placeholder {
            flex: 1;
            text-align: left;
            font-size: 15px;
            color: #aaa;
            user-select: none;
        }

        .mic-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: #e8e8e8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .3s;
        }

        .mic-btn svg { width: 22px; height: 22px; fill: #888; transition: fill .3s; }

        .mic-btn.active {
            background: linear-gradient(135deg, #ff4d4f, #ff7875);
            box-shadow: 0 0 0 4px rgba(255, 77, 79, .25);
            animation: micPulse 1.5s ease-in-out infinite;
        }

        .mic-btn.active svg { fill: #fff; }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(255, 77, 79, .25); }
            50% { box-shadow: 0 0 0 8px rgba(255, 77, 79, .12); }
        }

        .config-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            font-size: 12px;
            color: #ccc;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 200;
        }

        .config-panel {
            display: none;
            position: fixed;
            top: 40px;
            right: 12px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 16px;
            width: 280px;
            z-index: 199;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .1);
        }

        .config-panel.show { display: block; }
        .config-panel label { font-size: 12px; color: #888; display: block; margin-top: 8px; }
        .config-panel input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }

        /* 开幕式全屏舞台 */
        .stage { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
        .stage.active { display: block; }

        .particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; animation: particleFly linear forwards; }
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .light-rays {
            position: absolute; inset: 0;
            background: conic-gradient(from 0deg, transparent, rgba(255,200,50,.15), transparent, rgba(255,80,50,.12), transparent);
            animation: raysSpin 4s linear infinite;
            opacity: 0;
        }

        .stage.entering .light-rays { animation: raysSpin 4s linear infinite, raysIn .6s ease forwards; }
        @keyframes raysSpin { to { transform: rotate(360deg); } }
        @keyframes raysIn { from { opacity: 0; } to { opacity: 1; } }

        .curtain-left, .curtain-right {
            position: absolute; top: 0; bottom: 0; width: 50%; z-index: 10;
            background: linear-gradient(135deg, #8b0000, #dc143c, #8b0000);
            transition: transform .8s cubic-bezier(.77, 0, .18, 1);
        }

        .curtain-left { left: 0; }
        .curtain-right { right: 0; }
        .stage.playing .curtain-left { transform: translateX(-100%); }
        .stage.playing .curtain-right { transform: translateX(100%); }

        .banner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 20; text-align: center; pointer-events: none;
        }

        .stage.entering .banner { animation: bannerPop .7s cubic-bezier(.34, 1.56, .64, 1) .1s forwards; }
        @keyframes bannerPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .banner-title {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ff0844, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 2s ease infinite;
        }

        .banner-sub { font-size: clamp(14px, 3vw, 22px); color: #ffd700; margin-top: 12px; letter-spacing: 2px; }
        @keyframes goldShine { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .media-wrap {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; opacity: 0; transform: scale(.5);
        }

        .stage.playing .media-wrap { animation: mediaZoom .6s cubic-bezier(.34, 1.56, .64, 1) forwards; }
        .stage.loaded .media-wrap { opacity: 1; transform: scale(1); }
        @keyframes mediaZoom { to { opacity: 1; transform: scale(1); } }

        #stageVideo {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #stageVideo.active { display: block; }

        .loading-tip {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700; font-size: 18px; z-index: 6;
            display: none;
        }

        .stage.loading .loading-tip { display: block; }

        .close-btn {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            width: 44px; height: 44px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            background: rgba(0, 0, 0, .5);
            color: #fff; font-size: 20px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }

        .stage.playing .close-btn, .stage.loaded .close-btn { display: flex; }
    </style>
</head>
<body>

<button class="config-toggle" id="configToggle">⚙ 密钥</button>
<div class="config-panel" id="configPanel">
    <label>APPID</label><input id="appId" value="bab98dfc">
    <label>APIKey</label><input id="apiKey" value="e3a1bd8e628d45ac6214efd43cb1a32a">
    <label>APISecret</label><input id="apiSecret" value="NjJlNTlhMDNiY2JhNjE2ZWYyYTYzN2M4">
</div>

<div class="center-wrap">
    <div class="mascot-wrap" id="mascotWrap">
        <img id="mascotGif" src="assets/mascot.gif" alt="吉祥物" onerror="this.onerror=null;this.src='mascot.gif'">
    </div>
    <div class="input-box">
        <span class="input-placeholder" id="placeholder">发消息...</span>
        <button class="mic-btn" id="micBtn" title="开启语音监听">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>
</div>

<div class="stage" id="stage">
    <div class="particles" id="particles"></div>
    <div class="light-rays"></div>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="banner">
        <div class="banner-title" id="bannerTitle">开幕式</div>
        <div class="banner-sub" id="bannerSub">精彩即将呈现</div>
    </div>
    <div class="loading-tip" id="loadingTip">正在加载视频...</div>
    <div class="media-wrap">
        <video id="stageVideo" playsinline webkit-playsinline preload="auto"></video>
    </div>
    <button class="close-btn" id="closeBtn">✕</button>
</div>

<script>
(function () {
    'use strict';

    const VIDEO_POOL = [
        { url: 'assets/videos/opening.mp4', title: '开幕式视频' },
        { url: 'https://www.w3school.com.cn/example/html5/mov_bbb.mp4', title: 'Big Buck Bunny' },
        { url: 'https://www.w3school.com.cn/i/movie.mp4', title: 'W3School 示例' },
    ];

    const $ = id => document.getElementById(id);
    const micBtn = $('micBtn');
    const placeholder = $('placeholder');
    const mascotWrap = $('mascotWrap');
    const stage = $('stage');
    const stageVideo = $('stageVideo');
    const bannerTitle = $('bannerTitle');
    const bannerSub = $('bannerSub');
    const particles = $('particles');
    const closeBtn = $('closeBtn');
    const loadingTip = $('loadingTip');

    let isListening = false, isBusy = false, manualStop = false;
    let ws = null, audioContext = null, processor = null, mediaStream = null;
    let sendInterval = null, reconnectTimer = null, isConnecting = false;
    let pcmBuffer = [], frameStatus = 0, fullText = '', reconnectCount = 0;
    let ceremonyBusy = false, lastCmdTime = 0, mediaUnlocked = false;

    $('configToggle').onclick = () => $('configPanel').classList.toggle('show');

    function getConfig() {
        return {
            appId: $('appId').value.trim(),
            apiKey: $('apiKey').value.trim(),
            apiSecret: $('apiSecret').value.trim()
        };
    }

    function setVoiceUI(listening) {
        micBtn.classList.toggle('active', listening);
        placeholder.textContent = listening ? '正在监听...' : '发消息...';
    }

    function hideMascot() { mascotWrap.classList.add('hidden'); }
    function showMascot() { mascotWrap.classList.remove('hidden'); }

    async function unlockMediaPlayback() {
        if (mediaUnlocked) return;
        try {
            stageVideo.muted = true;
            stageVideo.src = VIDEO_POOL.find(v => v.url.startsWith('http'))?.url || VIDEO_POOL[1].url;
            stageVideo.load();
            await stageVideo.play();
            stageVideo.pause();
            stageVideo.removeAttribute('src');
            stageVideo.load();
            stageVideo.muted = false;
            mediaUnlocked = true;
        } catch (e) { console.warn('unlock media', e); }
    }

    function spawnParticles() {
        particles.innerHTML = '';
        const colors = ['#ffd700', '#ff6b35', '#ff0844', '#fff'];
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 4 + Math.random() * 10;
            p.style.cssText = `width:${size}px;height:${size}px;left:50%;top:50%;background:${colors[i % 4]};--tx:${(Math.random() - .5) * 600}px;--ty:${(Math.random() - .5) * 600}px;animation-duration:${.8 + Math.random()}s;`;
            particles.appendChild(p);
        }
    }

    function preloadVideo(url, timeoutMs) {
        return new Promise((resolve, reject) => {
            const timer = setTimeout(() => { cleanup(); reject(new Error('加载超时')); }, timeoutMs || 10000);
            const onCanPlay = () => { cleanup(); resolve(); };
            const onError = () => { cleanup(); reject(new Error('视频加载失败')); };
            const cleanup = () => {
                clearTimeout(timer);
                stageVideo.removeEventListener('canplay', onCanPlay);
                stageVideo.removeEventListener('error', onError);
            };
            stageVideo.src = url;
            stageVideo.load();
            if (stageVideo.readyState >= 3) onCanPlay();
            else {
                stageVideo.addEventListener('canplay', onCanPlay, { once: true });
                stageVideo.addEventListener('error', onError, { once: true });
            }
        });
    }

    async function loadVideoWithFallback() {
        const pool = [...VIDEO_POOL].sort(() => Math.random() - 0.5);
        let lastErr;
        for (const item of pool) {
            try {
                bannerSub.textContent = '正在加载：' + item.title;
                await preloadVideo(item.url, 8000);
                return item;
            } catch (e) {
                lastErr = e;
                console.warn('视频源失败', item.url, e);
            }
        }
        throw lastErr || new Error('所有视频源不可用');
    }

    async function safePlayVideo() {
        stageVideo.muted = true;
        try {
            await stageVideo.play();
            stageVideo.muted = false;
        } catch (e) {
            stageVideo.muted = false;
            await stageVideo.play();
        }
    }

    function requestFullscreen(el) {
        const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.webkitEnterFullscreen;
        if (fn) fn.call(el).catch(() => {});
        else if (stageVideo.webkitEnterFullscreen) stageVideo.webkitEnterFullscreen();
    }

    function exitFullscreen() {
        const fn = document.exitFullscreen || document.webkitExitFullscreen;
        if (fn && (document.fullscreenElement || document.webkitFullscreenElement)) {
            fn.call(document).catch(() => {});
        }
    }

    function resetStageDOM() {
        stageVideo.pause();
        stageVideo.removeAttribute('src');
        stageVideo.load();
        stage.className = 'stage';
        stageVideo.classList.remove('active');
    }

    function closeCeremony(exitFs) {
        ceremonyBusy = false;
        resetStageDOM();
        if (exitFs) exitFullscreen();
        showMascot();
    }

    closeBtn.onclick = () => closeCeremony(true);

    async function openCeremony() {
        if (ceremonyBusy) return;
        ceremonyBusy = true;
        hideMascot();
        resetStageDOM();

        stage.className = 'stage active entering loading';
        spawnParticles();
        loadingTip.style.display = 'block';
        bannerTitle.textContent = '开幕式';

        try {
            stageVideo.classList.add('active');
            const item = await loadVideoWithFallback();
            bannerSub.textContent = item.title;
            loadingTip.style.display = 'none';
            stage.classList.remove('loading');
            stage.classList.add('playing', 'loaded');

            await safePlayVideo();
            requestFullscreen(stageVideo);
            stageVideo.onended = () => closeCeremony(true);
        } catch (err) {
            console.error(err);
            loadingTip.textContent = '加载失败：' + (err.message || '请检查网络');
            bannerSub.textContent = '加载失败，3秒后关闭';
            ceremonyBusy = false;
            setTimeout(() => closeCeremony(true), 3000);
        }
    }

    /* 监听到「发布」立即全屏播放视频 */
    function tryExecuteCommand(text) {
        if (!text || ceremonyBusy) return;
        const cmd = text.replace(/\s/g, '');
        const now = Date.now();
        if (now - lastCmdTime < 2000) return;

        if (cmd.includes('发布')) {
            lastCmdTime = now;
            fullText = '';
            openCeremony();
        }
    }

    function formatMicError(err) {
        const name = err && err.name;
        if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
            return '麦克风被拒绝，请点击地址栏锁图标允许麦克风';
        }
        if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
            return '未检测到麦克风，请检查 Windows 声音设置';
        }
        if (name === 'NotReadableError' || name === 'TrackStartError') {
            return '麦克风被占用，请关闭其他录音软件后重试';
        }
        if (name === 'SecurityError' || name === 'NotSupportedError') {
            return '请用 https 或 localhost 打开（本地文件无法使用麦克风）';
        }
        return (err && err.message) || '启动失败';
    }

    async function ensureAudioContextReady() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) throw new Error('当前浏览器不支持音频引擎');
        if (!audioContext || audioContext.state === 'closed') audioContext = new Ctx();
        const deadline = Date.now() + 3000;
        while (audioContext.state !== 'running') {
            if (Date.now() > deadline) throw new Error('音频引擎启动超时，请重试');
            if (audioContext.state === 'suspended') await audioContext.resume();
            await new Promise(r => setTimeout(r, 40));
        }
    }

    /* 必须在用户点击后立刻调用，不能先 await 其他耗时操作 */
    async function requestMicrophone() {
        if (!window.isSecureContext) {
            throw new Error('请用 https 或 localhost 打开（本地 file:// 无法使用麦克风）');
        }
        const md = navigator.mediaDevices;
        if (!md || typeof md.getUserMedia !== 'function') {
            throw new Error('当前浏览器不支持麦克风，请用 Chrome 或 Edge');
        }
        return md.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        });
    }

    async function hmacSha256Base64(secret, msg) {
        const enc = new TextEncoder();
        const key = await crypto.subtle.importKey('raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
        const sig = await crypto.subtle.sign('HMAC', key, enc.encode(msg));
        return btoa(String.fromCharCode(...new Uint8Array(sig)));
    }

    async function getWebSocketUrl(apiKey, apiSecret) {
        const host = 'iat-api.xfyun.cn';
        const date = new Date().toUTCString();
        const origin = `host: ${host}\ndate: ${date}\nGET /v2/iat HTTP/1.1`;
        const sig = await hmacSha256Base64(apiSecret, origin);
        const auth = btoa(`api_key="${apiKey}", algorithm="hmac-sha256", headers="host date request-line", signature="${sig}"`);
        return `wss://${host}/v2/iat?authorization=${encodeURIComponent(auth)}&date=${encodeURIComponent(date)}&host=${host}`;
    }

    function resampleTo16k(input, rate) {
        if (rate === 16000) return input;
        const ratio = rate / 16000;
        const len = Math.round(input.length / ratio);
        const out = new Float32Array(len);
        for (let i = 0; i < len; i++) {
            const pos = i * ratio, idx = Math.floor(pos), f = pos - idx;
            out[i] = (input[idx] || 0) + ((input[idx + 1] || input[idx] || 0) - (input[idx] || 0)) * f;
        }
        return out;
    }

    function floatTo16BitPCM(f32) {
        const buf = new ArrayBuffer(f32.length * 2);
        const v = new DataView(buf);
        for (let i = 0; i < f32.length; i++) {
            const s = Math.max(-1, Math.min(1, f32[i]));
            v.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return buf;
    }

    function toBase64(buffer) {
        const b = new Uint8Array(buffer);
        let s = '';
        for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
        return btoa(s);
    }

    function mergeBuffers(list) {
        const total = list.reduce((n, b) => n + b.byteLength, 0);
        const out = new Uint8Array(total);
        let off = 0;
        list.forEach(b => { out.set(new Uint8Array(b), off); off += b.byteLength; });
        return out.buffer;
    }

    function parseResult(data) {
        const json = JSON.parse(data);
        if (json.code !== 0 || !json.data || !json.data.result) return;

        let text = '';
        (json.data.result.ws || []).forEach(w => (w.cw || []).forEach(c => text += c.w));
        if (!text) return;

        if (json.data.result.pgs === 'rpl') {
            fullText = json.data.result.rg ? fullText.substring(0, json.data.result.rg[0]) + text : text;
        } else {
            fullText += text;
        }

        tryExecuteCommand(fullText);
        if (json.data.status === 2) fullText = '';
    }

    function sendFrame(base64, status) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const frame = { data: { status, format: 'audio/L16;rate=16000', encoding: 'raw', audio: base64 } };
        if (status === 0) {
            frame.common = { app_id: getConfig().appId };
            frame.business = { language: 'zh_cn', domain: 'iat', accent: 'mandarin', vad_eos: 1500, dwa: 'wpgs' };
        }
        ws.send(JSON.stringify(frame));
    }

    function startCapture() {
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        const gain = audioContext.createGain();
        gain.gain.value = 0;
        processor.onaudioprocess = e => {
            if (!isListening) return;
            pcmBuffer.push(floatTo16BitPCM(resampleTo16k(e.inputBuffer.getChannelData(0), audioContext.sampleRate)));
        };
        source.connect(processor);
        processor.connect(gain);
        gain.connect(audioContext.destination);
    }

    function startSendLoop() {
        if (sendInterval) return;
        sendInterval = setInterval(() => {
            if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
            const merged = pcmBuffer.length ? mergeBuffers(pcmBuffer) : new ArrayBuffer(0);
            pcmBuffer = [];
            sendFrame(merged.byteLength ? toBase64(merged) : '', frameStatus);
            if (frameStatus === 0) frameStatus = 1;
        }, 200);
    }

    function closeWSOnly() {
        if (!ws) return;
        ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null;
        try { if (ws.readyState <= 1) ws.close(); } catch (e) {}
        ws = null;
    }

    function scheduleReconnect(reason) {
        if (!isListening || manualStop) return;
        clearTimeout(reconnectTimer);
        const delay = Math.min(500 + reconnectCount * 200, 2000);
        placeholder.textContent = '重连中...';
        reconnectTimer = setTimeout(connectWebSocket, delay);
    }

    async function connectWebSocket() {
        if (!isListening || manualStop || isConnecting) return;
        isConnecting = true;
        closeWSOnly();
        frameStatus = 0;
        fullText = '';
        try {
            const cfg = getConfig();
            ws = new WebSocket(await getWebSocketUrl(cfg.apiKey, cfg.apiSecret));
            ws.onopen = () => {
                isConnecting = false;
                reconnectCount = 0;
                setVoiceUI(true);
                startSendLoop();
            };
            ws.onmessage = e => { try { parseResult(e.data); } catch (err) {} };
            ws.onerror = () => { isConnecting = false; reconnectCount++; scheduleReconnect('异常'); };
            ws.onclose = () => {
                isConnecting = false;
                if (isListening && !manualStop) { reconnectCount++; scheduleReconnect('断开'); }
            };
        } catch (err) {
            isConnecting = false;
            reconnectCount++;
            scheduleReconnect('失败');
        }
    }

    function stopListening() {
        manualStop = true;
        isListening = false;
        clearTimeout(reconnectTimer);
        clearInterval(sendInterval);
        sendInterval = null;
        closeWSOnly();
        if (processor) { processor.onaudioprocess = null; processor.disconnect(); processor = null; }
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        pcmBuffer = [];
        frameStatus = 0;
        fullText = '';
        reconnectCount = 0;
        isConnecting = false;
        isBusy = false;
        setVoiceUI(false);
    }

    async function startListening(stream) {
        if (isBusy) return;
        const cfg = getConfig();
        if (!cfg.appId || !cfg.apiKey || !cfg.apiSecret) {
            placeholder.textContent = '请先配置讯飞密钥';
            $('configPanel').classList.add('show');
            stream.getTracks().forEach(t => t.stop());
            micBtn.classList.remove('active');
            return;
        }
        isBusy = true;
        manualStop = false;
        isListening = true;
        mediaStream = stream;
        try {
            placeholder.textContent = '启动中...';
            await ensureAudioContextReady();
            startCapture();
            isBusy = false;
            unlockMediaPlayback().catch(() => {});
            await connectWebSocket();
        } catch (err) {
            placeholder.textContent = formatMicError(err);
            stopListening();
        }
    }

    micBtn.onclick = async () => {
        if (isListening) { stopListening(); return; }
        if (isBusy) return;

        isBusy = true;
        manualStop = false;
        placeholder.textContent = '请求麦克风权限...';
        micBtn.classList.add('active');

        try {
            /* 关键：在用户点击瞬间立即请求麦克风，避免 await 视频加载导致手势失效 */
            const stream = await requestMicrophone();
            isBusy = false;
            await startListening(stream);
        } catch (err) {
            placeholder.textContent = formatMicError(err);
            micBtn.classList.remove('active');
            isBusy = false;
            manualStop = true;
            isListening = false;
        }
    };

    if (!window.isSecureContext) {
        placeholder.textContent = '请用 https 或 localhost 打开此页面';
    }
})();
</script>
</body>
</html>
